<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

<body>
<h1>LLRB — DeleteMax 전체 루프 (SEARCHXMPL → Empty)</h1>
<div class="legend">
  <span><span class="ld" style="background:#E24B4A;"></span>레드</span>
  <span><span class="ld" style="background:#2C2C2A;border:1.5px solid #555553;"></span>블랙</span>
  <span><span class="ld" style="background:transparent;border:2px dashed #EF9F27;"></span>타겟/포커스</span>
  <span style="color:#7ab83a;font-weight:600;">h→</span><span style="color:#7ab83a;"> h포인터</span>
  <span style="color:#5b9bd5;">← → 키 이동</span>
</div>

<div class="panel" style="padding-bottom:0.4rem;">
  <div class="step-lbl" id="step-title">-</div>
  <div class="counter" id="del-counter"></div>
  <div id="call-stack" class="call-stack" style="display:none"></div>
  <div id="op-lbl" class="op-lbl" style="display:none"></div>
  <div style="overflow-x:auto;">
    <svg id="svg" width="100%" viewBox="0 0 820 360"
         style="display:block;min-width:680px;"></svg>
  </div>
</div>

<div class="panel">
  <div class="step-lbl">실행 내용</div>
  <div class="code-box" id="code-box"></div>
</div>

<div class="controls">
  <div class="dots" id="dots"></div>
  <div class="btn-row">
    <button class="btn" id="btn-prev" onclick="go(-1)" disabled>← 이전</button>
    <button class="btn" id="btn-next" onclick="go(1)">다음 →</button>
  </div>
</div>

<script>
const BK={fill:"#2C2C2A",stroke:"#555553",text:"#F1EFE8"};
const RD={fill:"#E24B4A",stroke:"#A32D2D",text:"#ffffff"};
const R=20;

function draw(nodes,edges,hl,hNode){
  const svg=document.getElementById('svg');
  svg.innerHTML='';
  const pos={};
  nodes.forEach(n=>pos[n.id]={x:n.x,y:n.y});

  edges.forEach(e=>{
    const a=pos[e.from],b=pos[e.to];
    if(!a||!b)return;
    const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy);
    const el=document.createElementNS('http://www.w3.org/2000/svg','line');
    el.setAttribute('x1',a.x+dx/len*R); el.setAttribute('y1',a.y+dy/len*R);
    el.setAttribute('x2',b.x-dx/len*R); el.setAttribute('y2',b.y-dy/len*R);
    el.setAttribute('stroke',e.red?'#E24B4A':'#4a4a48');
    el.setAttribute('stroke-width',e.red?'2.5':'1.5');
    svg.appendChild(el);
  });

  nodes.forEach(n=>{
    const c=n.red?RD:BK;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    if(hl&&hl.includes(n.id)){
      const ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
      ring.setAttribute('cx',n.x); ring.setAttribute('cy',n.y); ring.setAttribute('r',R+7);
      ring.setAttribute('fill','none'); ring.setAttribute('stroke','#EF9F27');
      ring.setAttribute('stroke-width','2'); ring.setAttribute('stroke-dasharray','5 3');
      g.appendChild(ring);
    }
    const ci=document.createElementNS('http://www.w3.org/2000/svg','circle');
    ci.setAttribute('cx',n.x); ci.setAttribute('cy',n.y); ci.setAttribute('r',R);
    ci.setAttribute('fill',c.fill); ci.setAttribute('stroke',c.stroke); ci.setAttribute('stroke-width','1.5');
    g.appendChild(ci);
    const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
    tx.setAttribute('x',n.x); tx.setAttribute('y',n.y);
    tx.setAttribute('text-anchor','middle'); tx.setAttribute('dominant-baseline','central');
    tx.setAttribute('font-size','12'); tx.setAttribute('font-weight','500');
    tx.setAttribute('fill',c.text); tx.textContent=n.label;
    g.appendChild(tx);
    svg.appendChild(g);
  });

  if(hNode&&pos[hNode]){
    const p=pos[hNode];
    const al=34, x1=p.x-R-8-al, y1=p.y, x2=p.x-R-5, y2=p.y;
    const ln=document.createElementNS('http://www.w3.org/2000/svg','line');
    ln.setAttribute('x1',x1); ln.setAttribute('y1',y1);
    ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
    ln.setAttribute('stroke','#7ab83a'); ln.setAttribute('stroke-width','2');
    svg.appendChild(ln);
    const tip=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    tip.setAttribute('points',`${x2},${y2-4} ${x2+7},${y2} ${x2},${y2+4}`);
    tip.setAttribute('fill','#7ab83a'); svg.appendChild(tip);
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',x1-3); lbl.setAttribute('y',y1);
    lbl.setAttribute('text-anchor','end'); lbl.setAttribute('dominant-baseline','central');
    lbl.setAttribute('font-size','12'); lbl.setAttribute('font-weight','700');
    lbl.setAttribute('fill','#7ab83a');
    lbl.setAttribute('font-family','Courier New,monospace');
    lbl.textContent='h'; svg.appendChild(lbl);
  }
}

function nd(id,lb,x,y,red=false){return{id,label:lb,x,y,red};}
function eg(f,t,red=false){return{from:f,to:t,red};}

// ── 트리 상태 정의 ──────────────────────────────

// 초기 SEARCHXMPL  (레벨0:50 레벨1:140 레벨2:230 레벨3:315)
const INIT={
  nodes:[
    nd('M','M',410,50),
    nd('E','E',210,140),nd('R','R',610,140),
    nd('C','C',115,230),nd('L','L',305,230),nd('P','P',510,230),nd('X','X',710,230),
    nd('A','A',65,315,true),nd('H','H',255,315,true),nd('S','S',660,315,true),
  ],
  edges:[
    eg('M','E'),eg('M','R'),
    eg('E','C'),eg('E','L'),
    eg('R','P'),eg('R','X'),
    eg('C','A',true),eg('L','H',true),eg('X','S',true),
  ]
};

// [Del X] FlipColors(M): M=BK,E=RD,R=RD
const DX_FLIP={
  nodes:[
    nd('M','M',410,50),
    nd('E','E',210,140,true),nd('R','R',610,140,true),
    nd('C','C',115,230),nd('L','L',305,230),nd('P','P',510,230),nd('X','X',710,230),
    nd('A','A',65,315,true),nd('H','H',255,315,true),nd('S','S',660,315,true),
  ],
  edges:[
    eg('M','E',true),eg('M','R',true),
    eg('E','C'),eg('E','L'),
    eg('R','P'),eg('R','X'),
    eg('C','A',true),eg('L','H',true),eg('X','S',true),
  ]
};

// [Del X] RotateRight(X): S=BK(up), X=RD(right child of S)
const DX_ROT={
  nodes:[
    nd('M','M',410,50),
    nd('E','E',210,140,true),nd('R','R',610,140,true),
    nd('C','C',115,230),nd('L','L',305,230),nd('P','P',510,230),nd('S','S',710,230),
    nd('A','A',65,315,true),nd('H','H',255,315,true),nd('X','X',760,315,true),
  ],
  edges:[
    eg('M','E',true),eg('M','R',true),
    eg('E','C'),eg('E','L'),
    eg('R','P'),eg('R','S'),
    eg('C','A',true),eg('L','H',true),eg('S','X',true),
  ]
};

// [Del X] 결과: X삭제+Balance(FlipColors M) → M=BK,E=BK,R=BK
const AFT_X={
  nodes:[
    nd('M','M',410,50),
    nd('E','E',210,140),nd('R','R',610,140),
    nd('C','C',115,230),nd('L','L',305,230),nd('P','P',510,230),nd('S','S',710,230),
    nd('A','A',65,315,true),nd('H','H',255,315,true),
  ],
  edges:[
    eg('M','E'),eg('M','R'),
    eg('E','C'),eg('E','L'),
    eg('R','P'),eg('R','S'),
    eg('C','A',true),eg('L','H',true),
  ]
};

// [Del S] FlipColors(M): M=BK,E=RD,R=RD
const DS_FLIP1={
  nodes:[
    nd('M','M',410,50),
    nd('E','E',210,140,true),nd('R','R',610,140,true),
    nd('C','C',115,230),nd('L','L',305,230),nd('P','P',510,230),nd('S','S',710,230),
    nd('A','A',65,315,true),nd('H','H',255,315,true),
  ],
  edges:[
    eg('M','E',true),eg('M','R',true),
    eg('E','C'),eg('E','L'),
    eg('R','P'),eg('R','S'),
    eg('C','A',true),eg('L','H',true),
  ]
};

// [Del S] FlipColors(R): R=BK,P=RD,S=RD
const DS_FLIP2={
  nodes:[
    nd('M','M',410,50),
    nd('E','E',210,140,true),nd('R','R',610,140),
    nd('C','C',115,230),nd('L','L',305,230),nd('P','P',510,230,true),nd('S','S',710,230,true),
    nd('A','A',65,315,true),nd('H','H',255,315,true),
  ],
  edges:[
    eg('M','E',true),eg('M','R',true),
    eg('E','C'),eg('E','L'),
    eg('R','P',true),eg('R','S',true),
    eg('C','A',true),eg('L','H',true),
  ]
};

// [Del S] 결과: M=BK,*E=RD,R=BK,C=BK,L=BK,*P=RD,*A=RD,*H=RD
const AFT_S={
  nodes:[
    nd('M','M',410,50),
    nd('E','E',210,140,true),nd('R','R',610,140),
    nd('C','C',115,230),nd('L','L',305,230),nd('P','P',510,230,true),
    nd('A','A',65,315,true),nd('H','H',255,315,true),
  ],
  edges:[
    eg('M','E',true),eg('M','R'),
    eg('E','C'),eg('E','L'),
    eg('R','P',true),
    eg('C','A',true),eg('L','H',true),
  ]
};

// [Del R] RotateRight(M): E=BK root, M=RD
// E->left=C, E->right=M(RD), M->left=L, M->right=R, R->left=*P
const DR_ROT_M={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('M','M',610,140,true),
    nd('A','A',140,230,true),nd('L','L',510,230),nd('R','R',720,230),
    nd('H','H',460,315,true),nd('P','P',670,315,true),
  ],
  edges:[
    eg('E','C'),eg('E','M',true),
    eg('C','A',true),
    eg('M','L'),eg('M','R'),
    eg('L','H',true),eg('R','P',true),
  ]
};

// [Del R] RotateRight(R): P=BK up, R=RD right
const DR_ROT_R={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('M','M',610,140,true),
    nd('A','A',140,230,true),nd('L','L',510,230),nd('P','P',720,230),
    nd('H','H',460,315,true),nd('R','R',770,315,true),
  ],
  edges:[
    eg('E','C'),eg('E','M',true),
    eg('C','A',true),
    eg('M','L'),eg('M','P'),
    eg('L','H',true),eg('P','R',true),
  ]
};

// [Del R] 결과: Balance RotateLeft(E) → M=BK root, *E=RD
const AFT_R={
  nodes:[
    nd('M','M',410,50),
    nd('E','E',210,140,true),nd('P','P',610,140),
    nd('C','C',115,230),nd('L','L',305,230),
    nd('A','A',65,315,true),nd('H','H',255,315,true),
  ],
  edges:[
    eg('M','E',true),eg('M','P'),
    eg('E','C'),eg('E','L'),
    eg('C','A',true),eg('L','H',true),
  ]
};

// [Del P] RotateRight(M): E=BK root, M=RD
const DP_ROT_M={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('M','M',610,140,true),
    nd('A','A',140,230,true),nd('L','L',510,230),nd('P','P',720,230),
    nd('H','H',460,315,true),
  ],
  edges:[
    eg('E','C'),eg('E','M',true),
    eg('C','A',true),
    eg('M','L'),eg('M','P'),
    eg('L','H',true),
  ]
};

// [Del P] MoveRedRight(M) → FlipColors(M): M=BK,L=RD,P=RD
//         IsRed(L->left=*H)? YES → RotateRight(M): L=BK(up),M=RD
//         L->left=*H, L->right=M(RD), M->left=null, M->right=P(RD)
const DP_MRLEFT={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('L','L',610,140),
    nd('A','A',140,230,true),nd('H','H',510,230,true),nd('M','M',720,230,true),
    nd('P','P',770,315,true),
  ],
  edges:[
    eg('E','C'),eg('E','L'),
    eg('C','A',true),
    eg('L','H',true),eg('L','M',true),
    eg('M','P',true),
  ]
};

// [Del P] FlipColors(L): L=RD,H=BK,M=BK; then delete P; Balance RotateLeft(E) → L=BK root
const AFT_P={
  nodes:[
    nd('L','L',410,50),
    nd('E','E',210,140,true),nd('M','M',610,140),
    nd('C','C',115,230),nd('H','H',305,230),
    nd('A','A',65,315,true),
  ],
  edges:[
    eg('L','E',true),eg('L','M'),
    eg('E','C'),eg('E','H'),
    eg('C','A',true),
  ]
};

// [Del M] RotateRight(L): E=BK root, L=RD
// E->left=C, E->right=L(RD), L->left=H(BK), L->right=M
const DM_ROT_L={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('L','L',610,140,true),
    nd('A','A',140,230,true),nd('H','H',510,230),nd('M','M',720,230),
  ],
  edges:[
    eg('E','C'),eg('E','L',true),
    eg('C','A',true),
    eg('L','H'),eg('L','M'),
  ]
};

// [Del M] MoveRedRight(L): FlipColors(L)→L=BK,H=RD,M=RD; delete M
const DM_FLIP={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('L','L',610,140),
    nd('A','A',140,230,true),nd('H','H',510,230,true),nd('M','M',720,230,true),
  ],
  edges:[
    eg('E','C'),eg('E','L',true),
    eg('C','A',true),
    eg('L','H',true),eg('L','M',true),
  ]
};

// [Del M] 결과: M삭제 + Balance → E=BK root
const AFT_M={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('L','L',610,140),
    nd('A','A',140,230,true),nd('H','H',510,230,true),
  ],
  edges:[
    eg('E','C'),eg('E','L'),
    eg('C','A',true),eg('L','H',true),
  ]
};

// [Del L] RotateRight(L): H=BK up, L=RD right child of H; delete L
const DL_ROT={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('H','H',610,140),
    nd('A','A',140,230,true),nd('L','L',660,230,true),
  ],
  edges:[
    eg('E','C'),eg('E','H'),
    eg('C','A',true),eg('H','L',true),
  ]
};

// [Del L] 결과: E=BK, C=BK, H=BK, *A=RD
const AFT_L={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140),nd('H','H',610,140),
    nd('A','A',140,230,true),
  ],
  edges:[
    eg('E','C'),eg('E','H'),
    eg('C','A',true),
  ]
};

// [Del H] 래퍼 E=RD; FlipColors(E): E=BK, C=RD, H=RD
const DH_FLIP1={
  nodes:[
    nd('E','E',410,50),
    nd('C','C',210,140,true),nd('H','H',610,140,true),
    nd('A','A',140,230,true),
  ],
  edges:[
    eg('E','C',true),eg('E','H',true),
    eg('C','A',true),
  ]
};

// [Del H] IsRed(*A)? YES → RotateRight(E): C=BK up, E=RD
// C->left=A(RD→BK after FlipColors(C)), C->right=E(RD→BK after FlipColors)
// Actually after RotateRight(E): C=BK(gets E's color=BK), E=RD
// Then FlipColors(C): C=RD, A=BK (was RD), E=BK (was RD)
// E->right=H(RD from FlipColors(E))
const DH_ROT={
  nodes:[
    nd('C','C',410,50,true),
    nd('A','A',210,140),nd('E','E',610,140),
    nd('H','H',660,230,true),
  ],
  edges:[
    eg('C','A'),eg('C','E'),
    eg('E','H',true),
  ]
};

// [Del H] 결과: H삭제+Balance → C=BK, A=BK, E=BK
const AFT_H={
  nodes:[
    nd('C','C',410,50),
    nd('A','A',210,140),nd('E','E',610,140),
  ],
  edges:[
    eg('C','A'),eg('C','E'),
  ]
};

// [Del E] 래퍼 C=RD; FlipColors(C): C=BK,A=RD,E=RD; delete E; Balance → C=BK, *A=RD
const DE_FLIP={
  nodes:[
    nd('C','C',410,50),
    nd('A','A',210,140,true),nd('E','E',610,140,true),
  ],
  edges:[
    eg('C','A',true),eg('C','E',true),
  ]
};

const AFT_E={
  nodes:[
    nd('C','C',410,50),
    nd('A','A',210,140,true),
  ],
  edges:[
    eg('C','A',true),
  ]
};

// [Del C] RotateRight(C): A=BK up, C=RD right; delete C → A only
const DC_ROT={
  nodes:[
    nd('A','A',410,50),
    nd('C','C',510,140,true),
  ],
  edges:[
    eg('A','C',true),
  ]
};

const AFT_C={
  nodes:[ nd('A','A',410,90) ],
  edges:[]
};

// [Del A] 래퍼 A=RD → delete A → empty
const DA_RED={
  nodes:[ nd('A','A',410,90,true) ],
  edges:[]
};

const AFT_A={ nodes:[], edges:[] };

// ── STEPS ────────────────────────────────────────
const STEPS=[
  // ─ 초기 ─
  {
    title:"[초기] SEARCHXMPL — X(최댓값) 부터 순서대로 삭제",
    del:"",stack:"",op:"",hl:['X'],hNode:null,tree:INIT,
    code:`// while (!bst.IsEmpty()) { DeleteMax(); }
//
//              M
//       /             \\
//      E               R
//   /     \\         /     \\
//  C       L       P       X  ← 최댓값
// /       /               /
//*A     *H              *S`
  },

  // ─ DeleteMax: X ─
  {
    title:"[Del X] 래퍼: !IsRed(E)&&!IsRed(R) → root(M)=레드 → MoveRedRight(M) FlipColors(M)",

// ── 렌더 ──────────────────────────────────────
let cur=0;

function render(){
  const s=STEPS[cur];
  document.getElementById('step-title').textContent=
    `단계 ${cur+1} / ${STEPS.length} — ${s.title}`;

  const dc2=document.getElementById('del-counter');
  if(s.del){ dc2.style.display='block'; dc2.textContent='▶ '+s.del; }
  else dc2.style.display='none';

  const cs=document.getElementById('call-stack');
  if(s.stack){
    cs.style.display='block';
    cs.innerHTML='<span style="color:#888780;font-size:10px;">콜스택:</span>\n'+
      s.stack.split('\n').map((l,i)=>
        i===0?`<span style="color:#EF9F27;">> ${l}</span>`:
              `<span style="color:#3a6a8a;">  ${l}</span>`
      ).join('\n');
  } else cs.style.display='none';

  const op=document.getElementById('op-lbl');
  if(s.op){op.style.display='inline-block';op.textContent=s.op;}
  else op.style.display='none';

  document.getElementById('code-box').innerHTML=s.code;
  draw(s.tree.nodes,s.tree.edges,s.hl,s.hNode);

  const dc=document.getElementById('dots');
  dc.innerHTML='';
  STEPS.forEach((_,i)=>{
    const d=document.createElement('span');
    d.className='dot'+(i===cur?' active':'');
    d.onclick=()=>{cur=i;render();};
    dc.appendChild(d);
  });

  document.getElementById('btn-prev').disabled=cur===0;
  document.getElementById('btn-next').disabled=cur===STEPS.length-1;
}

function go(d){
  cur=Math.max(0,Math.min(STEPS.length-1,cur+d));
  render();
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
  if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
});

render();
</script>
