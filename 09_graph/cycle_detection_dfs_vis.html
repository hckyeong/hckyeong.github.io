const CODE = [
  'void DetectCycle()',
  '{',
  '    prev.resize(vertices.size(), nullptr);',
  '    on_stack.resize(vertices.size(), false);',
  '    cycle.clear();',
  '    for (auto* v : vertices)',
  '        v->visited = false;',
  '    for (auto* v : vertices)',
  '    {',
  '        DetectCycle(v);',
  '        if (!cycle.empty()) {',
  '            cout << "Cycle detected" << endl;',
  '            PrintCycle(cycle);',
  '            return;',
  '        }',
  '    }',
  '    if (cycle.empty())',
  '        cout << "No cycle detected" << endl;',
  '}',
  '',
  'void DetectCycle(Vertex* v)',
  '{',
  '    v->visited = true;',
  '    on_stack[v->index] = true;',
  '    for (auto* w : v->out_neighbors)',
  '    {',
  '        if (!cycle.empty())',
  '            return;',
  '        else if (!w->visited)',
  '        {',
  '            prev[w->index] = v;',
  '            DetectCycle(w);',
  '        }',
  '        else if (on_stack[w->index])',
  '        {',
  '            cycle.push_back(w);',
  '            Vertex* current = v;',
  '            while (current != w)',
  '            {',
  '                cycle.push_back(prev[current->index]);',
  '                current = prev[current->index];',
  '            }',
  '            cycle.push_back(w);',
  '        }',
  '    }',
  '    on_stack[v->index] = false;',
  '}'
];

let caseIndex = 0;
let cur = 0;
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function colorize(text){
  return escapeHtml(text)
    .replace(/"([^"]*)"/g,'<span class="str">"$1"</span>')
    .replace(/\b(void|for|if|else|return|while)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(true|false|nullptr)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(Vertex|Graph|vector|bool)\b/g,'<span class="tp">$1</span>')
    .replace(/\b(DetectCycle|PrintCycle|push_back|resize|clear|empty)\b/g,'<span class="fn">$1</span>')
    .replace(/\b(vertices|visited|on_stack|cycle|prev|index|out_neighbors|current|w|v|cout|endl)\b/g,'<span class="id">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
}
function buildCode(){
  const body=document.getElementById('code-body');
  body.innerHTML = CODE.map((line,i)=>{
    const indent=Math.floor((line.match(/^\s*/)[0].length)/4);
    const trimmed=line.trimStart();
    const html=trimmed.length?colorize(trimmed):'&nbsp;';
    return `<div class="cline" id="cl-${i}"><div class="lnum">${i+1}</div><div class="lcode" style="--indent:${indent}">${html}</div></div>`;
  }).join('');
}
function buildGraph(){
  const cfg=CASES[caseIndex];
  const SVG='http://www.w3.org/2000/svg';
  const eg=document.getElementById('edge-group');
  const ng=document.getElementById('node-group');
  eg.innerHTML=''; ng.innerHTML='';
  const arrowLen=12, arrowWidth=8;
  cfg.edges.forEach(([a,b],i)=>{
    const p1=cfg.pos[a], p2=cfg.pos[b];
    const dx=p2.x-p1.x, dy=p2.y-p1.y; const len=Math.hypot(dx,dy); const ux=dx/len, uy=dy/len;
    const x1=p1.x+ux*28, y1=p1.y+uy*28; const x2=p2.x-ux*28, y2=p2.y-uy*28;
    const line=document.createElementNS(SVG,'line');
    line.id=`e-${i}`; line.setAttribute('x1',x1); line.setAttribute('y1',y1); line.setAttribute('x2',x2); line.setAttribute('y2',y2);
    line.setAttribute('stroke','#555'); line.setAttribute('stroke-width','1.6'); line.setAttribute('opacity','0.45'); eg.appendChild(line);
    const bx=x2-ux*arrowLen, by=y2-uy*arrowLen; const nx=-uy*(arrowWidth/2), ny=ux*(arrowWidth/2);
    const arrow=document.createElementNS(SVG,'polygon');
    arrow.id=`a-${i}`; arrow.setAttribute('points',`${x2},${y2} ${bx+nx},${by+ny} ${bx-nx},${by-ny}`);
    arrow.setAttribute('fill','#555'); arrow.setAttribute('stroke','none'); arrow.setAttribute('stroke-width','0'); arrow.setAttribute('opacity','0.45'); eg.appendChild(arrow);
  });
  cfg.nodes.forEach(id=>{
    const p=cfg.pos[id];
    const group=document.createElementNS(SVG,'g');
    const c=document.createElementNS(SVG,'circle'); c.id=`n-${id}`; c.setAttribute('cx',p.x); c.setAttribute('cy',p.y); c.setAttribute('r',24);
    const t=document.createElementNS(SVG,'text'); t.id=`t-${id}`; t.setAttribute('x',p.x); t.setAttribute('y',p.y); t.setAttribute('text-anchor','middle'); t.setAttribute('dominant-baseline','central'); t.setAttribute('font-size','14'); t.setAttribute('font-weight','700'); t.textContent=id;
    group.appendChild(c); group.appendChild(t); ng.appendChild(group);
  });
}
function renderCaseButtons(){
  document.getElementById('case-bar').innerHTML = CASES.map((cfg,i)=>`<button class="cbtn ${i===caseIndex?'active':''}" onclick="setCase(${i})">${cfg.label}</button>`).join('');
}
function renderPrev(step, count){
  const wrap=document.getElementById('prev-grid'); wrap.innerHTML='';
  for(let i=0;i<count;i++){
    const cell=document.createElement('div'); cell.className='pcell';
    const lab=document.createElement('div'); lab.className='inlabel'; lab.textContent=i;
    const val=document.createElement('div'); val.className='pval'+(step.prev[i]!==null?' set':'')+(step.tracePrev===i?' focus':'');
    val.textContent=step.prev[i]===null?'·':step.prev[i];
    cell.appendChild(lab); cell.appendChild(val); wrap.appendChild(cell);
  }
}
function renderBoolGrid(targetId, count, activeList, current, cycleList, mode){
  const wrap=document.getElementById(targetId); wrap.innerHTML='';
  for(let i=0;i<count;i++){
    const cell=document.createElement('div'); cell.className='icell';
    const lab=document.createElement('div'); lab.className='inlabel'; lab.textContent=i;
    const val=document.createElement('div');
    let cls='inval';
    if(current===i) cls+=' curr';
    else if(cycleList.includes(i)) cls+=' cyc';
    else if(activeList.includes(i)) cls+= mode==='stack' ? ' stack' : ' vis';
    val.className=cls;
    val.textContent=activeList.includes(i)?'T':'F';
    cell.appendChild(lab); cell.appendChild(val); wrap.appendChild(cell);
  }
}
function render(){
  const cfg=CASES[caseIndex];
  const step=cfg.steps[cur];
  const cyclePath = step.cyclePath || [];
  document.getElementById('step-counter').textContent=`${cfg.label}  step ${cur+1} / ${cfg.steps.length}`;
  document.getElementById('step-desc').textContent=step.desc;
  document.getElementById('cycle-note').textContent=step.cycleNote;
  document.getElementById('cycle-build').textContent=step.cycleBuild || 'back edge를 만난 뒤 cycle.push_back(...)가 실행되면 여기에 누적 과정이 표시된다.';
  document.querySelectorAll('.cline').forEach((el,i)=>el.classList.toggle('hl', step.hl.includes(i+1)));
  renderBoolGrid('visited-grid', cfg.nodes.length, step.visited, step.current, cyclePath, 'visited');
  renderBoolGrid('stack-grid', cfg.nodes.length, step.onstack, step.current, cyclePath, 'stack');
  renderPrev(step, cfg.nodes.length);
  document.getElementById('stack-disp').innerHTML = step.call.length ? step.call.map((id,idx)=>`<span class="chip ${idx===step.call.length-1?'chip-cur':'chip-stack'}">${id}</span>`).join('') : '<span class="empty">empty</span>';
  document.getElementById('cycle-disp').innerHTML = step.cycle.length ? step.cycle.map(v=>`<span class="chip chip-cyc">${v}</span>`).join('') : '<span class="empty">empty</span>';
  document.getElementById('cycle-path-disp').innerHTML = cyclePath.length ? cyclePath.map(v=>`<span class="chip chip-cyc">${v}</span>`).join('') : '<span class="empty">not built yet</span>';
  const clog=document.getElementById('console-log');
  clog.innerHTML = step.console.length ? step.console.map(line=>`<div class="logline">${escapeHtml(line)}</div>`).join('') : '<div class="logline">(no output)</div>';
  cfg.nodes.forEach(id=>{
    const c=document.getElementById(`n-${id}`), t=document.getElementById(`t-${id}`);
    const state=(id===step.current)?'current':(cyclePath.includes(id)?'cycle':(step.onstack.includes(id)?'stack':(step.visited.includes(id)?'visited':'idle')));
    const map={idle:{f:'rgba(55,55,55,.5)',s:'#555',t:'#777'},visited:{f:'rgba(78,201,176,.14)',s:'#4ec9b0',t:'#4ec9b0'},stack:{f:'rgba(86,156,214,.14)',s:'#569cd6',t:'#9cdcfe'},current:{f:'rgba(247,178,103,.18)',s:'#f7b267',t:'#f7b267'},cycle:{f:'rgba(240,149,149,.16)',s:'#f09595',t:'#ffb8b8'}}[state];
    c.setAttribute('fill',map.f); c.setAttribute('stroke',map.s); c.setAttribute('stroke-width',state==='current'?'2.5':'1.5');
    t.setAttribute('fill',map.t);
  });
  cfg.edges.forEach(([a,b],i)=>{
    const line=document.getElementById(`e-${i}`), arrow=document.getElementById(`a-${i}`);
    const active = step.activeEdge && step.activeEdge[0]===a && step.activeEdge[1]===b;
    const cyc = step.cycleEdges.some(([x,y])=>x===a && y===b);
    const trace = step.traceEdge && step.traceEdge[0]===a && step.traceEdge[1]===b;
    const color = cyc ? '#f09595' : (trace ? '#9b9bea' : (active ? '#f7b267' : '#585860'));
    const width = cyc ? '2.6' : (trace ? '2.3' : (active ? '2.3' : '1.6'));
    const opacity = cyc || trace || active ? '1' : '0.45';
    line.setAttribute('stroke',color); line.setAttribute('stroke-width',width); line.setAttribute('opacity',opacity);
    arrow.setAttribute('fill',color); arrow.setAttribute('stroke',(cyc||trace||active)?color:'none'); arrow.setAttribute('stroke-width',(cyc||trace||active)?'0.8':'0'); arrow.setAttribute('opacity',opacity);
  });
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===cur));
  document.getElementById('prev').disabled = cur===0;
  document.getElementById('next').disabled = cur===cfg.steps.length-1;
}
function buildDots(){ const cfg=CASES[caseIndex]; document.getElementById('dots').innerHTML = cfg.steps.map((_,i)=>`<span class="dot ${i===0?'active':''}"></span>`).join(''); }
function setCase(i){ caseIndex=i; cur=0; renderCaseButtons(); buildGraph(); buildDots(); render(); }
function go(delta){ const cfg=CASES[caseIndex]; const next=Math.max(0,Math.min(cfg.steps.length-1,cur+delta)); if(next!==cur){ cur=next; render(); } }
document.addEventListener('keydown',e=>{ if(e.key==='ArrowLeft'){e.preventDefault();go(-1);} else if(e.key==='ArrowRight'){e.preventDefault();go(1);} else if(e.key==='Home'){e.preventDefault();cur=0;render();} else if(e.key==='End'){e.preventDefault();cur=CASES[caseIndex].steps.length-1;render();} });
buildCode(); renderCaseButtons(); buildGraph(); buildDots(); render();
</script>
