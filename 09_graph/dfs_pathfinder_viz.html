<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFS Path Finder 시각화</title>
<link rel="stylesheet" href="../shared/topological-baseline.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;min-height:100vh}
body{background:#1e1e1e;color:#d4d4d4;font-family:'Consolas','Courier New',monospace;font-size:13px;padding:16px}
h1{font-size:14px;font-weight:400;color:#858585;margin-bottom:10px;letter-spacing:.5px}
#step-counter{font-size:11px;color:#858585}
#step-desc{font-size:13px;color:#e0e0e0;margin-top:5px;min-height:38px;line-height:1.6;padding:7px 10px;background:#252526;border-left:3px solid #569cd6;border-radius:0 4px 4px 0}
#legend{display:flex;gap:14px;flex-wrap:wrap;margin:10px 0}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#858585}
.leg-c{width:10px;height:10px;border-radius:50%;border:1.5px solid}
#main-content{display:flex;flex-wrap:wrap;align-items:flex-start;gap:14px;margin:12px 0}
#graph-panel{flex:1 1 460px;min-width:min(100%,460px);background:#252526;border:1px solid #3e3e42;border-radius:6px;padding:6px}
#graph-panel svg{width:100%;display:block}
#right-panel{flex:1 1 400px;min-width:min(100%,400px);display:flex;flex-direction:column;gap:8px}
.sbox{background:#252526;border:1px solid #3e3e42;border-radius:6px;padding:9px 11px}
.slabel{font-size:10px;color:#858585;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
#visited-grid{display:flex;gap:5px;flex-wrap:wrap}
.icell{display:flex;flex-direction:column;align-items:center;gap:2px}
.inlabel{font-size:10px;color:#555}
.inval{min-width:34px;height:28px;padding:0 6px;border:1px solid #3e3e42;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;background:#2d2d2d;color:#d4d4d4;transition:all .25s}
.inval.true{border-color:#4ec9b0;color:#4ec9b0;background:rgba(78,201,176,.1)}
.inval.back{border-color:#f7b267;color:#f7b267;background:rgba(247,178,103,.12)}
.stack-list{display:flex;flex-direction:column;gap:6px;min-height:48px}
.stack-frame{background:#1e1e1e;border:1px solid #3e3e42;border-radius:6px;padding:8px 10px;transition:all .2s}
.stack-frame.active{border-color:#569cd6;background:rgba(86,156,214,.08)}
.stack-frame.wait{border-color:#9b9bea;background:rgba(155,155,234,.08)}
.stack-frame.dead{opacity:.42;border-style:dashed}
.stack-fn{font-size:12px;font-weight:700;color:#dcdcaa;margin-bottom:3px}
.stack-detail{font-size:11px;color:#858585;line-height:1.6}
.stack-detail .pathval{color:#4ec9b0}
#outputPanel,#successPanel{display:flex;flex-direction:column;gap:6px;min-height:48px}
.trace-item{padding:7px 9px;border-radius:5px;border:1px solid rgba(86,156,214,.3);background:rgba(86,156,214,.08);color:#d4d4d4;font-size:12px}
.found-item{padding:7px 9px;border-radius:5px;border:1px solid rgba(78,201,176,.35);background:rgba(78,201,176,.08);color:#d4d4d4;font-size:12px}
.empty{color:#555;font-size:11px}
#code-panel{background:#1e1e1e;border:1px solid #3e3e42;border-radius:6px;overflow:hidden;margin-bottom:12px}
#code-title{background:#2d2d2d;padding:4px 12px;font-size:11px;color:#858585;border-bottom:1px solid #3e3e42}
#code-body{padding:6px 0;max-height:340px;overflow:auto}
.cline{display:flex;align-items:stretch;min-height:22px;border-left:2px solid transparent;transition:background .2s}
.cline.hl{background:rgba(255,255,120,.08);border-left:2px solid #dcdcaa}
.cline.hl .lnum{color:#858585;background:rgba(255,255,255,.02)}
.cline.hl .lcode{background:rgba(255,255,255,.015)}
.lnum{width:40px;text-align:right;padding:3px 12px 3px 0;color:#444;font-size:11px;user-select:none;flex-shrink:0}
.lcode{position:relative;flex:1;font-size:12px;line-height:1.6;color:#d4d4d4;padding:3px 12px 3px calc(var(--indent,0) * 18px + 14px);white-space:pre}
.lcode::before{
  content:'';
  position:absolute;
  left:14px;
  top:0;
  bottom:0;
  width:calc(var(--indent,0) * 18px);
  background-image:repeating-linear-gradient(
    to right,
    transparent 0 13px,
    rgba(255,255,255,.11) 13px 14px,
    transparent 14px 18px
  );
  pointer-events:none;
}
.kw{color:#569cd6}
.tp{color:#4ec9b0}
.fn{color:#dcdcaa}
.id{color:#9cdcfe}
.num{color:#b5cea8}
.ok{color:#4ec9b0;font-weight:700}
.warn{color:#f7b267;font-weight:700}
.cm{color:#6a9955}
#nav{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:4px;flex-wrap:wrap}
.nbtn{background:#2d2d2d;border:1px solid #3e3e42;color:#d4d4d4;padding:6px 18px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px}
.nbtn:hover:not(:disabled){background:#3e3e42}
.nbtn:disabled{opacity:.3;cursor:default}
#dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;max-width:520px;justify-content:center}
.dot{width:6px;height:6px;border-radius:50%;background:#3e3e42;transition:background .2s}
.dot.active{background:#858585}
svg text{font-family:'Consolas','Courier New',monospace}
@media (max-width:980px){#main-content{flex-direction:column}#graph-panel{flex:1 1 auto}}
</style>
</head>
<body>
<h1>DepthFirstPath(2, 4) / DFS 경로 탐색 시각화</h1>
<div id="step-counter"></div>
<div id="step-desc"></div>

<div id="legend">
  <div class="leg"><div class="leg-c" style="background:rgba(55,55,55,.45);border-color:#555"></div>미방문</div>
  <div class="leg"><div class="leg-c" style="background:rgba(247,178,103,.22);border-color:#f7b267"></div>현재 호출</div>
  <div class="leg"><div class="leg-c" style="background:rgba(78,201,176,.18);border-color:#4ec9b0"></div>visited=true</div>
  <div class="leg"><div class="leg-c" style="background:rgba(240,96,48,.18);border-color:#f06030"></div>backtrack</div>
  <div class="leg"><div class="leg-c" style="background:rgba(86,156,214,.18);border-color:#569cd6"></div>탐색 간선</div>
  <div class="leg"><div class="leg-c" style="background:rgba(78,201,176,.24);border-color:#4ec9b0"></div>찾은 경로</div>
</div>

<div id="main-content">
  <div id="graph-panel">
    <svg viewBox="0 0 420 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <circle id="glow0" cx="70" cy="60" r="30" fill="none" opacity="0"/>
      <circle id="glow2" cx="210" cy="60" r="30" fill="none" opacity="0"/>
      <circle id="glow1" cx="100" cy="190" r="30" fill="none" opacity="0"/>
      <circle id="glow3" cx="320" cy="190" r="30" fill="none" opacity="0"/>
      <circle id="glow4" cx="210" cy="320" r="30" fill="none" opacity="0"/>
      <circle id="glow5" cx="370" cy="320" r="30" fill="none" opacity="0"/>

      <line id="e02" x1="96" y1="60" x2="184" y2="60" stroke="#555" stroke-width="1.1" marker-end="url(#ah)"/>
      <line id="e21" x1="194" y1="84" x2="116" y2="168" stroke="#555" stroke-width="1.1" marker-end="url(#ah)"/>
      <line id="e23" x1="230" y1="80" x2="304" y2="170" stroke="#555" stroke-width="1.1" marker-end="url(#ah)"/>
      <line id="e34" x1="306" y1="210" x2="226" y2="300" stroke="#555" stroke-width="1.1" marker-end="url(#ah)"/>
      <line id="e15" x1="120" y1="208" x2="352" y2="304" stroke="#555" stroke-width="1.1" marker-end="url(#ah)"/>
      <line id="e24" x1="224" y1="82" x2="216" y2="296" stroke="#555" stroke-width="1.1" marker-end="url(#ah)"/>
      <line id="e35" x1="338" y1="210" x2="358" y2="298" stroke="#555" stroke-width="1.1" marker-end="url(#ah)"/>
      <line id="e53" x1="352" y1="300" x2="332" y2="212" stroke="#555" stroke-width="1.1" marker-end="url(#ah)"/>

      <circle cx="70" cy="60" r="24" fill="#2d2d2d" stroke="#555" stroke-width="1.1"/>
      <text x="70" y="60" text-anchor="middle" dominant-baseline="central" fill="#777" font-size="14" font-weight="700">0</text>

      <circle cx="210" cy="60" r="24" fill="#2d2d2d" stroke="#555" stroke-width="1.1"/>
      <text x="210" y="60" text-anchor="middle" dominant-baseline="central" fill="#d4d4d4" font-size="14" font-weight="700">2</text>

      <circle cx="100" cy="190" r="24" fill="#2d2d2d" stroke="#555" stroke-width="1.1"/>
      <text x="100" y="190" text-anchor="middle" dominant-baseline="central" fill="#d4d4d4" font-size="14" font-weight="700">1</text>

      <circle cx="320" cy="190" r="24" fill="#2d2d2d" stroke="#555" stroke-width="1.1"/>
      <text x="320" y="190" text-anchor="middle" dominant-baseline="central" fill="#d4d4d4" font-size="14" font-weight="700">3</text>

      <circle cx="210" cy="320" r="24" fill="#2d2d2d" stroke="#555" stroke-width="1.1"/>
      <text x="210" y="320" text-anchor="middle" dominant-baseline="central" fill="#f7b267" font-size="14" font-weight="700">4</text>
      <text x="210" y="355" text-anchor="middle" fill="#f7b26788" font-size="10">sink</text>

      <circle cx="370" cy="320" r="24" fill="#2d2d2d" stroke="#555" stroke-width="1.1"/>
      <text x="370" y="320" text-anchor="middle" dominant-baseline="central" fill="#d4d4d4" font-size="14" font-weight="700">5</text>
    </svg>
  </div>

  <div id="right-panel">
    <div class="sbox">
      <div class="slabel">Visited</div>
      <div id="visited-grid"></div>
    </div>
    <div class="sbox">
      <div class="slabel">Call Stack (top → bottom)</div>
      <div id="stackPanel" class="stack-list"></div>
    </div>
    <div class="sbox">
      <div class="slabel">PrintPath Output</div>
      <div id="outputPanel"></div>
    </div>
    <div class="sbox">
      <div class="slabel">Complete Paths (source == sink)</div>
      <div id="successPanel"></div>
    </div>
  </div>
</div>

<div id="code-panel">
  <div id="code-title">DepthFirstPath / DepthFirstPathHelper — Graph 2</div>
  <div id="code-body"></div>
</div>

<div id="nav">
  <button class="nbtn" id="prev" onclick="go(-1)">← 이전</button>
  <button class="nbtn" id="reset" onclick="resetSteps()">처음</button>
  <div id="dots"></div>
  <button class="nbtn" id="next" onclick="go(1)">다음 →</button>
</div>

<script>
const codeLines = [
  'void DepthFirstPath(int source, int sink)',
  '{',
  '    for (auto* v : this->vertices)',
  '        v->visited = false;',
  '',
  '    DepthFirstPathHelper(vertices[source], vertices[sink], vector<Vertex*>());',
  '}',
  '',
  'void DepthFirstPathHelper(Vertex* source, Vertex* sink, vector<Vertex*> path)',
  '{',
  '    path.push_back(source);',
  '    PrintPath(path);',
  '',
  '    if (source == sink)',
  '        return;',
  '',
  '    source->visited = true;',
  '',
  '    for (auto* w : source->out_neighbors)',
  '    {',
  '        if (!w->visited)',
  '            DepthFirstPathHelper(w, sink, path);',
  '    }',
  '',
  '    source->visited = false;',
  '}'
];

function buildCode(){
  var p = document.getElementById('code-body');
  var h = '';
  for (var i = 0; i < codeLines.length; i++) {
    var line = codeLines[i];
    var indent = Math.floor((line.match(/^\s*/)[0].length) / 4);
    var trimmed = line.trimStart();
    h += '<div class="cline" id="CL' + i + '">';
    h += '<div class="lnum">' + (i + 1) + '</div>';
    h += '<div class="lcode" style="--indent:' + indent + '">' + (trimmed ? colorizeCode(trimmed) : '&nbsp;') + '</div>';
    h += '</div>';
  }
  p.innerHTML = h;
}

function esc(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function colorizeCode(text){
  return esc(text)
    .replace(/\b(void|for|if|return|auto)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(false|true)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(Vertex|vector|int)\b/g,'<span class="tp">$1</span>')
    .replace(/\b(DepthFirstPath|DepthFirstPathHelper|PrintPath|push_back)\b/g,'<span class="fn">$1</span>')
    .replace(/\b(source|sink|path|visited|vertices|out_neighbors|this)\b/g,'<span class="id">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="num">$1</span>');
}

const NOW='rgba(247,178,103,0.26)';
const VIS='rgba(78,201,176,0.18)';
const BACK='rgba(240,96,48,0.18)';
const FOUND='rgba(78,201,176,0.26)';
const EH='#569cd6';
const SK='#9b9bea';

const steps = [
  {
    cl:[2,3,5], gl:{glow2:NOW}, eg:{},
    vi:{0:'f',1:'f',2:'f',3:'f',4:'f',5:'f'},
    st:[], out:[], hit:[],
    note:'DepthFirstPath(2, 4) 시작. 먼저 모든 visited를 false로 초기화하고 source=V2로 첫 재귀 호출을 준비합니다.'
  },
  {
    cl:[10,11], gl:{glow2:NOW}, eg:{},
    vi:{0:'f',1:'f',2:'f',3:'f',4:'f',5:'f'},
    st:[{n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'act'}],
    out:['2'], hit:[],
    note:'Helper(V2, V4, []) 진입. path는 값 복사로 전달되므로 먼저 V2를 push하고 PrintPath(path)가 2를 출력합니다.'
  },
  {
    cl:[13,16], gl:{glow2:VIS}, eg:{},
    vi:{0:'f',1:'f',2:'T',3:'f',4:'f',5:'f'},
    st:[{n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'act'}],
    out:['2'], hit:[],
    note:'V2는 sink가 아니므로 return하지 않습니다. 같은 경로 안에서 중복 방문을 막기 위해 V2.visited = true가 됩니다.'
  },
  {
    cl:[18,19,20,21,10,11], gl:{glow2:VIS,glow1:NOW}, eg:{e21:EH},
    vi:{0:'f',1:'f',2:'T',3:'f',4:'f',5:'f'},
    st:[
      {n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'w'},
      {n:'DepthFirstPathHelper(V1, V4, [V2])',p:'[V2, V1]',s:'act'}
    ],
    out:['2','2 → 1'], hit:[],
    note:'V2의 첫 번째 out_neighbor는 V1입니다. V1은 아직 방문하지 않았으므로 재귀 호출되고, 복사된 path 위에 V1이 추가되어 2 → 1이 출력됩니다.'
  },
  {
    cl:[13,16], gl:{glow2:VIS,glow1:VIS}, eg:{},
    vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'f'},
    st:[
      {n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'w'},
      {n:'DepthFirstPathHelper(V1, V4, [V2])',p:'[V2, V1]',s:'act'}
    ],
    out:['2','2 → 1'], hit:[],
    note:'V1도 sink가 아니므로 visited를 true로 바꿉니다.'
  },
  {
    cl:[18,19,20,21,10,11], gl:{glow2:VIS,glow1:VIS,glow5:NOW}, eg:{e15:EH},
    vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'f'},
    st:[
      {n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'w'},
      {n:'DepthFirstPathHelper(V1, V4, [V2])',p:'[V2, V1]',s:'w'},
      {n:'DepthFirstPathHelper(V5, V4, [V2, V1])',p:'[V2, V1, V5]',s:'act'}
    ],
    out:['2','2 → 1','2 → 1 → 5'], hit:[],
    note:'V1의 유일한 이웃 V5로 재귀 호출합니다. path는 다시 복사되어 2 → 1 → 5가 출력됩니다.'
  },
  {
    cl:[13,16], gl:{glow2:VIS,glow1:VIS,glow5:VIS}, eg:{},
    vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'T'},
    st:[
      {n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'w'},
      {n:'DepthFirstPathHelper(V1, V4, [V2])',p:'[V2, V1]',s:'w'},
      {n:'DepthFirstPathHelper(V5, V4, [V2, V1])',p:'[V2, V1, V5]',s:'act'}
    ],
    out:['2','2 → 1','2 → 1 → 5'], hit:[],
    note:'V5도 sink가 아니므로 visited=true가 됩니다.'
  },
  {
    cl:[18,19,20,21,10,11], gl:{glow2:VIS,glow1:VIS,glow5:VIS,glow3:NOW}, eg:{e53:EH},
    vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'T'},
    st:[
      {n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'w'},
      {n:'DepthFirstPathHelper(V1, V4, [V2])',p:'[V2, V1]',s:'w'},
      {n:'DepthFirstPathHelper(V5, V4, [V2, V1])',p:'[V2, V1, V5]',s:'w'},
      {n:'DepthFirstPathHelper(V3, V4, [V2, V1, V5])',p:'[V2, V1, V5, V3]',s:'act'}
    ],
    out:['2','2 → 1','2 → 1 → 5','2 → 1 → 5 → 3'], hit:[],
    note:'V5의 이웃 V3로 내려갑니다. 양방향 간선 때문에 이후 V3에서 다시 V5를 만날 수 있지만, visited가 중복 방문을 막습니다.'
  },
  {
    cl:[13,16], gl:{glow2:VIS,glow1:VIS,glow5:VIS,glow3:VIS}, eg:{},
    vi:{0:'f',1:'T',2:'T',3:'T',4:'f',5:'T'},
    st:[
      {n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'w'},
      {n:'DepthFirstPathHelper(V1, V4, [V2])',p:'[V2, V1]',s:'w'},
      {n:'DepthFirstPathHelper(V5, V4, [V2, V1])',p:'[V2, V1, V5]',s:'w'},
      {n:'DepthFirstPathHelper(V3, V4, [V2, V1, V5])',p:'[V2, V1, V5, V3]',s:'act'}
    ],
    out:['2','2 → 1','2 → 1 → 5','2 → 1 → 5 → 3'], hit:[],
    note:'V3는 sink가 아니므로 visited=true가 됩니다.'
  },
  {
    cl:[18,19,20,21,10,11], gl:{glow2:VIS,glow1:VIS,glow5:VIS,glow3:VIS,glow4:NOW}, eg:{e34:EH},
    vi:{0:'f',1:'T',2:'T',3:'T',4:'f',5:'T'},
    st:[
      {n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'w'},
      {n:'DepthFirstPathHelper(V1, V4, [V2])',p:'[V2, V1]',s:'w'},
      {n:'DepthFirstPathHelper(V5, V4, [V2, V1])',p:'[V2, V1, V5]',s:'w'},
      {n:'DepthFirstPathHelper(V3, V4, [V2, V1, V5])',p:'[V2, V1, V5, V3]',s:'w'},
      {n:'DepthFirstPathHelper(V4, V4, [V2, V1, V5, V3])',p:'[V2, V1, V5, V3, V4]',s:'act'}
    ],
    out:['2','2 → 1','2 → 1 → 5','2 → 1 → 5 → 3','2 → 1 → 5 → 3 → 4'],
    hit:['2 → 1 → 5 → 3 → 4'],
    note:'V3의 첫 번째 이웃 V4로 내려가면서 완전한 경로 2 → 1 → 5 → 3 → 4가 출력됩니다.'
  },
  {
    cl:[13,14], gl:{glow2:VIS,glow1:VIS,glow5:VIS,glow3:VIS,glow4:FOUND}, eg:{e34:EH},
    vi:{0:'f',1:'T',2:'T',3:'T',4:'f',5:'T'},
    st:[
      {n:'DepthFirstPathHelper(V2, V4, [])',p:'[V2]',s:'w'},
      {n:'DepthFirstPathHelper(V1, V4, [V2])',p:'[V2, V1]',s:'w'},
      {n:'DepthFirstPathHelper(V5, V4, [V2, V1])',p:'[V2, V1, V5]',s:'w'},
      {n:'DepthFirstPathHelper(V3, V4, [V2, V1, V5])',p:'[V2, V1, V5, V3]',s:'w'},
      {n:'DepthFirstPathHelper(V4, V4, [V2, V1, V5, V3])',p:'[V2, V1, V5, V3, V4]',s:'ded'}
    ],
    out:['2','2 → 1','2 → 1 → 5','2 → 1 → 5 → 3','2 → 1 → 5 → 3 → 4'],
    hit:['2 → 1 → 5 → 3 → 4'],
    note:'source == sink 이므로 바로 return합니다. V4는 visited=true로 바뀌지 않고 즉시 상위 호출로 복귀합니다.'

var ci=0;

function buildDots(){
  var dots = '';
  for (var i = 0; i < steps.length; i++) dots += '<div class="dot" id="dot'+i+'"></div>';
  document.getElementById('dots').innerHTML = dots;
}

function syncNav(){
  document.getElementById('prev').disabled = ci === 0;
  document.getElementById('next').disabled = ci === steps.length - 1;
  document.querySelectorAll('.dot').forEach(function(dot){dot.classList.remove('active');});
  var activeDot = document.getElementById('dot' + ci);
  if (activeDot) activeDot.classList.add('active');
}

function setStep(next){
  ci = Math.max(0, Math.min(steps.length - 1, next));
  render();
}

function go(delta){
  setStep(ci + delta);
}

function resetSteps(){
  setStep(0);
}

function render(){
  var s=steps[ci];

  document.querySelectorAll('.cline').forEach(function(e){e.classList.remove('hl');});
  s.cl.forEach(function(i){var e=document.getElementById('CL'+i);if(e){e.classList.add('hl');}});
  var first=s.cl.length?document.getElementById('CL'+s.cl[0]):null;
  if(first){
    var p=document.getElementById('code-body');
    var t=first.offsetTop-p.offsetTop-p.clientHeight/3;
    p.scrollTop=Math.max(0,t);
  }

  ['glow0','glow1','glow2','glow3','glow4','glow5'].forEach(function(id){
    var el=document.getElementById(id);
    if(s.gl[id]){el.setAttribute('fill',s.gl[id]);el.setAttribute('opacity','1');}
    else{el.setAttribute('fill','none');el.setAttribute('opacity','0');}
  });

  ['e02','e21','e23','e34','e15','e24','e35','e53'].forEach(function(id){
    var el=document.getElementById(id);
    if(s.eg[id]){el.setAttribute('stroke',s.eg[id]);el.setAttribute('stroke-width','2.5');}
    else{
      var def = '#555';
      var dw = '1.1';
      el.setAttribute('stroke',def);el.setAttribute('stroke-width',dw);
    }
  });

  var vh='';
  for(var k=0;k<6;k++){
    var v=s.vi[k];
    var cls='inval';
    var txt='false';
    if(v==='T'){cls+=' true';txt='true';}
    else if(v==='F'){cls+=' back';txt='back';}
    vh+='<div class="icell"><div class="inlabel">V'+k+'</div><div class="'+cls+'">'+txt+'</div></div>';
  }
  document.getElementById('visited-grid').innerHTML=vh;

  var sh='';
  for(var i=s.st.length-1;i>=0;i--){
    var f=s.st[i];
    var cls='stack-frame';
    if(f.s==='act')cls+=' active';
    if(f.s==='w')cls+=' wait';
    if(f.s==='ded')cls+=' dead';
    sh+='<div class="'+cls+'"><div class="stack-fn">'+esc(f.n)+'</div><div class="stack-detail">path = <span class="pathval">'+esc(f.p)+'</span></div></div>';
  }
  document.getElementById('stackPanel').innerHTML=sh||'<div class="empty">(empty)</div>';

  var oh='';
  if(s.out.length){
    s.out.forEach(function(p,i){oh+='<div class="trace-item">#'+(i+1)+'  '+esc(p)+'</div>';});
  }
  document.getElementById('outputPanel').innerHTML=oh||'<div class="empty">(no output yet)</div>';

  var fh='';
  if(s.hit.length){
    s.hit.forEach(function(p,i){fh+='<div class="found-item">#'+(i+1)+'  '+esc(p)+'</div>';});
  }
  document.getElementById('successPanel').innerHTML=fh||'<div class="empty">(no complete path yet)</div>';

  document.getElementById('step-counter').textContent='Step ' + ci + ' / ' + (steps.length - 1);
  document.getElementById('step-desc').textContent=s.note;
  syncNav();
}

document.addEventListener('keydown',function(e){
  if(e.defaultPrevented) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();go(1);}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(-1);}
  if(e.key==='Home'||e.key==='r'||e.key==='R'){e.preventDefault();resetSteps();}
  if(e.key==='End'){e.preventDefault();setStep(steps.length-1);}
});

buildCode();
buildDots();
render();
</script>
