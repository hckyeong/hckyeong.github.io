<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DFS Path Finder — DepthFirstPath(2, 4)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1e1e2e;color:#cdd6f4;font-family:'Noto Sans KR','JetBrains Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none}

.top-bar{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;background:#181825;border-bottom:1px solid #313244;flex-shrink:0}
.top-bar h1{font-size:14px;font-weight:500;color:#cdd6f4;font-family:'JetBrains Mono',monospace}
.step-info{font-family:'JetBrains Mono',monospace;font-size:13px;color:#6c7086}
.step-info span{color:#89b4fa;font-weight:700}

.main{display:flex;flex:1;overflow:hidden}

.panel{display:flex;flex-direction:column;border-right:1px solid #313244;overflow:hidden}
.panel:last-child{border-right:none}
.panel-header{padding:8px 14px;background:#181825;border-bottom:1px solid #313244;font-size:12px;font-weight:500;color:#6c7086;text-transform:uppercase;letter-spacing:1px;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.panel-body{flex:1;overflow-y:auto;padding:10px 14px;scrollbar-width:thin;scrollbar-color:#45475a #1e1e2e}
.panel-body::-webkit-scrollbar{width:6px}
.panel-body::-webkit-scrollbar-track{background:#1e1e2e}
.panel-body::-webkit-scrollbar-thumb{background:#45475a;border-radius:3px}

.p-graph{width:38%;min-width:300px}
.p-code{width:34%;min-width:260px}
.p-state{width:28%;min-width:220px}

svg text{font-family:'JetBrains Mono',monospace}

.code-line{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8;padding:1px 8px;color:#6c7086;white-space:pre;position:relative;border-radius:3px;transition:all .15s}
.code-line.active{background:#264f78;color:#e6edf3;font-weight:500}
.code-line .ln{display:inline-block;width:28px;text-align:right;margin-right:12px;color:#45475a;font-size:11px}
.code-line.active .ln{color:#89b4fa}
.indent-guide{position:absolute;top:0;bottom:0;border-left:1px dashed #45475a;pointer-events:none}

.stack-frame{background:#181825;border:1px solid #313244;border-radius:6px;padding:8px 10px;margin-bottom:6px;transition:all .2s}
.stack-frame.active{border-color:#89b4fa;background:#1a1b2e}
.stack-frame.dead{opacity:.3;border-style:dashed}
.stack-frame .fn{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:#cdd6f4;margin-bottom:3px}
.stack-frame .detail{font-family:'JetBrains Mono',monospace;font-size:11px;color:#6c7086;line-height:1.6}
.stack-frame .detail .val{color:#a6e3a1;font-weight:500}
.stack-frame .detail .danger{color:#f38ba8;font-weight:500}
.stack-frame .detail .found{color:#f9e2af;font-weight:700}

.var-row{display:flex;justify-content:space-between;padding:3px 0;font-family:'JetBrains Mono',monospace;font-size:12px;border-bottom:1px solid #313244}
.var-row:last-child{border-bottom:none}
.var-row .vname{color:#6c7086}
.var-row .vval{color:#a6e3a1;font-weight:500}
.var-row .vval.on{color:#f38ba8}
.var-row .vval.off{color:#a6e3a1}

.found-box{background:#1a1b2e;border:1px solid #f9e2af33;border-radius:6px;padding:8px 10px;margin-top:10px}
.found-box .title{font-size:11px;color:#f9e2af;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.found-box .path{font-family:'JetBrains Mono',monospace;font-size:12px;color:#cdd6f4;line-height:1.7}

.bottom-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:10px 20px;background:#181825;border-top:1px solid #313244;flex-shrink:0}
.bottom-bar .hint{font-family:'JetBrains Mono',monospace;font-size:11px;color:#45475a}
.bottom-bar .hint kbd{background:#313244;color:#6c7086;padding:1px 6px;border-radius:3px;font-size:11px}
.note-box{font-family:'JetBrains Mono',monospace;font-size:12px;color:#f9e2af;text-align:center;padding:4px;background:#f9e2af11;border-radius:4px;margin-top:4px}
</style>
</head>

        <line id="e35" x1="338" y1="210" x2="358" y2="298" stroke="#585b70" stroke-width="1" marker-end="url(#ah)"/>
        <line id="e53" x1="352" y1="300" x2="332" y2="212" stroke="#585b70" stroke-width="1" marker-end="url(#ah)"/>

        <circle cx="70" cy="60" r="24" fill="#313244" stroke="#585b70" stroke-width="1"/>

        <circle cx="210" cy="60" r="24" fill="#313244" stroke="#585b70" stroke-width="1"/>
        <text x="210" y="60" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-size="14" font-weight="700">2</text>

        <circle cx="100" cy="190" r="24" fill="#313244" stroke="#585b70" stroke-width="1"/>
        <text x="100" y="190" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-size="14" font-weight="700">1</text>

        <circle cx="320" cy="190" r="24" fill="#313244" stroke="#585b70" stroke-width="1"/>
        <text x="320" y="190" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-size="14" font-weight="700">3</text>

        <circle cx="210" cy="320" r="24" fill="#313244" stroke="#585b70" stroke-width="1"/>
        <text x="210" y="320" text-anchor="middle" dominant-baseline="central" fill="#f9e2af" font-size="14" font-weight="700">4</text>
        <text x="210" y="355" text-anchor="middle" fill="#f9e2af88" font-size="10">sink</text>

        <circle cx="370" cy="320" r="24" fill="#313244" stroke="#585b70" stroke-width="1"/>
        <text x="370" y="320" text-anchor="middle" dominant-baseline="central" fill="#cdd6f4" font-size="14" font-weight="700">5</text>

        
      </svg>
    </div>
    <div id="noteBox" class="note-box" style="margin:0 10px 10px"></div>
  </div>

  <div class="panel p-code">
    <div class="panel-header">Code trace</div>
    <div class="panel-body" id="codePanel"></div>
  </div>

  <div class="panel p-state">
    <div class="panel-header">State</div>
    <div class="panel-body">
      <div style="font-size:11px;color:#45475a;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;font-family:'JetBrains Mono',monospace">Visited flags</div>
      <div id="visitedPanel"></div>
      <div style="font-size:11px;color:#45475a;text-transform:uppercase;letter-spacing:1px;margin:14px 0 6px;font-family:'JetBrains Mono',monospace">Call stack</div>
      <div id="stackPanel"></div>
      <div id="foundPanel"></div>
    </div>
  </div>
</div>

<div class="bottom-bar">
  <span class="hint"><kbd>←</kbd> prev</span>
  <span class="hint"><kbd>→</kbd> next</span>
  <span class="hint"><kbd>R</kbd> reset</span>
</div>

<script>
var IG = 14;
var codeLines = [

  {d:2,t:'Helper(V1, sink=V4, [V2]):'},

  {d:3,t:'V1.visited = true'},

  {d:4,t:'Helper(V4,sink=V4,[V2,V3]):'},
  {d:4,t:'{'},

  {d:4,t:'}'},

  {d:5,t:'V5==V4? NO'},
  {d:5,t:'V5.visited = true'},
  {d:5,t:'for V3 in out_neighbors:'},
  {d:6,t:'V3.visited? → YES, skip'},
  {d:5,t:'no unvisited neighbors'},
  {d:5,t:'V5.visited = false ← BACK'},
  {d:5,t:'return'},
  {d:4,t:'}'},
  {d:3,t:'V3.visited = false ← BACK'},
  {d:3,t:'return'},
  {d:2,t:'}'},
  {d:1,t:'for V4 in out_neighbors:'},
  {d:2,t:'Helper(V4, sink=V4, [V2]):'},
  {d:2,t:'{'},
  {d:3,t:'push_back(V4) → [V2,V4]'},
  {d:3,t:'V4==V4? YES → FOUND #2!'},
  {d:3,t:'return'},
  {d:2,t:'}'},
  {d:1,t:'V2.visited = false ← BACK'},
  {d:1,t:'return → DONE'},
  {d:0,t:'}'},
];

function buildCode(){
  var p = document.getElementById('codePanel');
  var h = '';
  for(var i=0;i<codeLines.length;i++){
    var c=codeLines[i];
    var guides='';
    for(var g=1;g<=c.d;g++) guides+='<span class="indent-guide" style="left:'+(g*IG+30)+'px"></span>';
    var ln = String(i+1).padStart(2,' ');
    h+='<div class="code-line" id="CL'+i+'" style="padding-left:'+((c.d*IG)+40)+'px">'+guides+'<span class="ln">'+ln+'</span>'+esc(c.t)+'</div>';
  }
  p.innerHTML=h;
}
function esc(s){return s.replace(/</g,'&lt;').replace(/>/g,'&gt;');}

var NOW='rgba(137,180,250,0.35)';
var VIS='rgba(166,227,161,0.25)';
var BACK='rgba(243,139,168,0.3)';
var FOUND='rgba(249,226,175,0.4)';
var DEAD='rgba(88,91,112,0.2)';
var NO='none';
var EH='#89b4fa'; var EN='#585b70';

var steps=[
{cl:[],gl:{},eg:{},vi:{0:'f',1:'f',2:'f',3:'f',4:'f',5:'f'},
 st:[],found:[],note:'Ready. sink = V4'},

{cl:[0,1,2],gl:{glow2:NOW},eg:{},vi:{0:'f',1:'f',2:'f',3:'f',4:'f',5:'f'},
 st:[{n:'Helper(V2)',p:'[V2]',s:'act'}],found:[],note:'Enter V2, push to path'},

{cl:[3,4],gl:{glow2:VIS},eg:{},vi:{0:'f',1:'f',2:'T',3:'f',4:'f',5:'f'},
 st:[{n:'Helper(V2)',p:'[V2]',s:'act'}],found:[],note:'V2 != V4, visited=true'},

{cl:[5,6,7,8],gl:{glow2:VIS,glow1:NOW},eg:{e21:EH},vi:{0:'f',1:'f',2:'T',3:'f',4:'f',5:'f'},

{cl:[9,10],gl:{glow2:VIS,glow1:VIS},eg:{},vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'f'},
 st:[{n:'Helper(V2)',p:'[V2]',s:'w'},{n:'Helper(V1)',p:'[V2, V1]',s:'act'}],found:[],note:'V1 != V4, visited=true'},

{cl:[11,12,13,14],gl:{glow2:VIS,glow1:VIS,glow5:NOW},eg:{e15:EH},vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'f'},
 st:[{n:'Helper(V2)',p:'[V2]',s:'w'},{n:'Helper(V1)',p:'[V2, V1]',s:'w'},{n:'Helper(V5)',p:'[V2, V1, V5]',s:'act'}],found:[],note:'Recurse → V5'},

{cl:[15,16],gl:{glow2:VIS,glow1:VIS,glow5:VIS},eg:{},vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'T'},
 st:[{n:'Helper(V2)',p:'[V2]',s:'w'},{n:'Helper(V1)',p:'[V2, V1]',s:'w'},{n:'Helper(V5)',p:'[V2, V1, V5]',s:'act'}],found:[],note:'V5 != V4, visited=true'},

{cl:[17,18,19],gl:{glow2:VIS,glow1:VIS,glow5:VIS},eg:{e53:EN},vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'T'},
 st:[{n:'Helper(V2)',p:'[V2]',s:'w'},{n:'Helper(V1)',p:'[V2, V1]',s:'w'},{n:'Helper(V5)',p:'[V2, V1, V5]',s:'act'}],found:[],note:'V5→V3: V3 not visited but... wait, V3.visited=false, skip? No — actually all neighbors visited or none unvisited lead anywhere'},

{cl:[20,21,22],gl:{glow2:VIS,glow1:VIS,glow5:BACK},eg:{},vi:{0:'f',1:'T',2:'T',3:'f',4:'f',5:'F'},
 st:[{n:'Helper(V2)',p:'[V2]',s:'w'},{n:'Helper(V1)',p:'[V2, V1]',s:'act'},{n:'Helper(V5)',p:'[V2, V1, V5]',s:'ded'}],found:[],note:'V5.visited=false (backtrack)'},

{cl:[23,24,25],gl:{glow2:VIS,glow1:BACK},eg:{},vi:{0:'f',1:'F',2:'T',3:'f',4:'f',5:'f'},
 st:[{n:'Helper(V2)',p:'[V2]',s:'act'},{n:'Helper(V1)',p:'[V2, V1]',s:'ded'}],found:[],note:'V1.visited=false (backtrack)'},

 st:[{n:'Helper(V2)',p:'[V2]',s:'w'},{n:'Helper(V3)',p:'[V2, V3]',s:'act'}],found:[],note:'Next neighbor: Recurse → V3'},

var ci=0;

function render(){
  var s=steps[ci];

  document.querySelectorAll('.code-line').forEach(function(e){e.classList.remove('active');});
  s.cl.forEach(function(i){var e=document.getElementById('CL'+i);if(e){e.classList.add('active');}});
  var first=s.cl.length?document.getElementById('CL'+s.cl[0]):null;
  if(first){var p=document.getElementById('codePanel');var t=first.offsetTop-p.offsetTop-p.clientHeight/3;p.scrollTop=Math.max(0,t);}

  ['glow0','glow1','glow2','glow3','glow4','glow5'].forEach(function(id){
    var el=document.getElementById(id);
    if(s.gl[id]){el.setAttribute('fill',s.gl[id]);el.setAttribute('opacity','1');}
    else{el.setAttribute('fill','none');el.setAttribute('opacity','0');}
  });

  ['e02','e21','e23','e34','e15','e24','e35','e53'].forEach(function(id){
    var el=document.getElementById(id);
    if(s.eg[id]){el.setAttribute('stroke',s.eg[id]);el.setAttribute('stroke-width','2.5');}
    else{
      var def = '#585b70';
      var dw = '1';
      el.setAttribute('stroke',def);el.setAttribute('stroke-width',dw);
    }
  });

  var vh='';
  for(var k=0;k<6;k++){
    var v=s.vi[k];
    var cls='vval';
    var txt='false';
    if(v==='T'){cls='vval on';txt='true';}
    else if(v==='F'){cls='vval off';txt='false (restored)';}
    vh+='<div class="var-row"><span class="vname">V'+k+'.visited</span><span class="'+cls+'">'+txt+'</span></div>';
  }
  document.getElementById('visitedPanel').innerHTML=vh;

  var sh='';
  for(var i=s.st.length-1;i>=0;i--){
    var f=s.st[i];
    var cls='stack-frame';
    if(f.s==='act')cls+=' active';
    if(f.s==='ded')cls+=' dead';
    sh+='<div class="'+cls+'"><div class="fn">'+f.n+'</div><div class="detail">path = <span class="val">'+f.p+'</span></div></div>';
  }
  document.getElementById('stackPanel').innerHTML=sh||'<div style="font-size:12px;color:#45475a;font-style:italic">(empty)</div>';

  var fh='';
  if(s.found.length){
    fh='<div class="found-box"><div class="title">Found paths</div>';
    s.found.forEach(function(p,i){fh+='<div class="path">#'+(i+1)+': '+p+'</div>';});
    fh+='</div>';
  }
  document.getElementById('foundPanel').innerHTML=fh;

  document.getElementById('noteBox').textContent=s.note;
  document.getElementById('curStep').textContent=ci;
  document.getElementById('totalStep').textContent=steps.length-1;
}

document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){e.preventDefault();if(ci<steps.length-1){ci++;render();}}
  if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();if(ci>0){ci--;render();}}
  if(e.key==='r'||e.key==='R'){ci=0;render();}
});

buildCode();
render();
</script>
</body>
</html>
