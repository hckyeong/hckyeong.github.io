<div style="padding:1rem 0">
  <div style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px;">Median of Medians 단계별 실행 (CLRS 9.3)</div>
  <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:10px;">arr = [24, 23, 22, ..., 0] (역순, n=25) &nbsp;|&nbsp; k = 13번째 작은 값 (중간값) 탐색</div>

  <div class="pbar"><div class="pfill" id="pf"></div></div>
  <div id="phase-el"></div>

  <div class="sec">arr</div>
  <div style="margin-bottom:5px;" id="range-el"></div>
  <div class="arow" id="arr-el" style="margin-bottom:10px;"></div>

  <div class="explain" id="exp"></div>

  <div id="groups-section" style="display:none;">
    <div class="sec" id="groups-label">groups</div>
    <div class="groups-wrap" id="groups-el"></div>
  </div>

  <div class="sec">call stack</div>
  <div class="stack-wrap" id="stack-el"></div>

  <!-- 컨트롤 버튼 -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:6px;">
    <button class="btn p" onclick="prev()">&#9664; 이전</button>
    <button class="btn p" onclick="next()">다음 &#9654;</button>
    <button class="btn" onclick="autoPlay()" id="abtn">&#9654; 자동재생</button>
    <button class="btn" onclick="reset()">&#8634; 초기화</button>
    <span style="font-size:12px;color:var(--color-text-secondary);" id="sc"></span>
  </div>

  <!-- 코드 패널 + 변수 감시창 (컨트롤 버튼 아래) -->
  <div class="bottom-panel">
    <div class="code-col">
      <div class="sec" style="margin-top:10px;">현재 실행 중인 코드</div>
      <div class="code-wrap"><div class="code-inner" id="code-el"></div></div>
    </div>
    <div class="watch-col">
      <div class="sec" style="margin-top:10px;">변수 감시</div>
      <div class="watch-wrap" id="watch-el"></div>
    </div>
  </div>

  <div class="legend">
    <span><span class="ld" style="background:#FAC775;border:.5px solid #BA7517;"></span>현재 활성 / 최솟값</span>
    <span><span class="ld" style="background:#DDB8F7;border:.5px solid #9B59D0;"></span>그룹 중간값</span>
    <span><span class="ld" style="background:#A8E6DE;border:.5px solid #3AADA0;"></span>피벗</span>
    <span><span class="ld" style="background:#B5D4F4;border:.5px solid #378ADD;"></span>피벗보다 작음</span>
    <span><span class="ld" style="background:#F4C0D1;border:.5px solid #D4537E;"></span>피벗보다 큼</span>
    <span><span class="ld" style="background:#C0DD97;border:.5px solid #639922;"></span>확정 / 결과</span>
  </div>
</div>

<script>
// ── 코드 라인 정의 (C++ 원본 기준) ────────────────────────────────────────────
const CODE_LINES = [
  // 0
  {t:"Pair Select(vector<int>& arr, int lo, int hi, int k)", type:'def'},
  // 1
  {t:"{",                                                     type:'code'},
  // 2
  {t:"    // 5의 배수 아닌 경우: 정렬로 범위 축소",          type:'comment'},
  // 3
  {t:"    while ((hi - lo + 1) % 5 != 0)",                   type:'code'},
  // 4
  {t:"    {",                                                 type:'code'},
  // 5
  {t:"        SelectionSortPass(arr, lo, hi);",              type:'code'},
  // 6
  {t:"        if (k == 1) return { lo, arr[lo] };",         type:'code'},
  // 7
  {t:"        lo += 1;  k -= 1;",                           type:'code'},
  // 8
  {t:"    }",                                                 type:'code'},
  // 9
  {t:"",                                                      type:'blank'},
  // 10
  {t:"    int g = (hi - lo + 1) / 5;  // 그룹 개수",        type:'code'},
  // 11
  {t:"",                                                      type:'blank'},
  // 12
  {t:"    // 각 그룹 정렬: stride = g",                     type:'comment'},
  // 13
  {t:"    for (int j = lo; j < hi; j++)",                    type:'code'},
  // 14
  {t:"        SelectionSortPass(arr, j, hi, g);",           type:'code'},
  // 15
  {t:"",                                                      type:'blank'},
  // 16
  {t:"    // 중간값의 중간값 재귀 호출",                    type:'comment'},
  // 17
  {t:"    Pair x = Select(arr,",                            type:'code'},
  // 18
  {t:"        lo+2*g, lo+3*g-1, ceil(g/2.0));",            type:'code'},
  // 19
  {t:"",                                                      type:'blank'},
  // 20
  {t:"    // 피벗 교환 -> Partition",                       type:'comment'},
  // 21
  {t:"    swap(arr[x.index], arr[hi]);",                    type:'code'},
  // 22
  {t:"    int index = Partition(arr, lo, hi);",             type:'code'},
  // 23
  {t:"",                                                      type:'blank'},
  // 24
  {t:"    // 올바른 측으로 재귀",                           type:'comment'},
  // 25
  {t:"    if (index - lo == k - 1)",                        type:'code'},
  // 26
  {t:"        return Pair{ index, arr[index] };",           type:'code'},
  // 27
  {t:"    else if (k - 1 < index - lo)",                    type:'code'},
  // 28
  {t:"        return Select(arr, lo, index-1, k);",         type:'code'},
  // 29
  {t:"    else",                                             type:'code'},
  // 30
  {t:"        return Select(arr, index+1, hi,",             type:'code'},
  // 31
  {t:"               k - index + lo - 1);",                 type:'code'},
  // 32
  {t:"}",                                                     type:'code'},
];

// ── 변수 감시 정의 (C++ 변수명 기준) ──────────────────────────────────────────
const VAR_DEFS = [
  {key:'depth',   label:'depth',        group:'호출 컨텍스트'},
  {key:'lo',      label:'lo',           group:'호출 컨텍스트'},
  {key:'hi',      label:'hi',           group:'호출 컨텍스트'},
  {key:'k',       label:'k',            group:'호출 컨텍스트'},
  {key:'g',       label:'g',            group:'그룹화'},
  {key:'x_val',   label:'x.value',      group:'파티션'},
  {key:'x_idx',   label:'x.index',      group:'파티션'},
  {key:'index',   label:'index',        group:'파티션'},
  {key:'r',       label:'index-lo',     group:'파티션'},
  {key:'result',  label:'result ★',    group:'반환값'},
];

// ── 데이터 생성 ───────────────────────────────────────────────────────────────
const N = 25;
const initArr = Array.from({length:N},(_,i)=>N-1-i);

const PHASES = {
  init:      {label:'초기화',           bg:'#EDE7F6',tc:'#6A1B9A'},
  call:      {label:'Select 호출',      bg:'#EDE7F6',tc:'#6A1B9A'},
  trim:      {label:'1단계: 트리밍',    bg:'#FFF9E6',tc:'#854F0B'},
  groups:    {label:'2단계: 그룹화',    bg:'#F0F8E8',tc:'#2E6B10'},
  bsort:     {label:'3단계: 그룹 정렬', bg:'#F0F8E8',tc:'#2E6B10'},
  recurse:   {label:'재귀 호출',        bg:'#EDE7F6',tc:'#6A1B9A'},
  pivot:     {label:'피벗 설정',        bg:'#E0F5F2',tc:'#0C4A40'},
  partition: {label:'파티션',           bg:'#FDEEF2',tc:'#72243E'},
  return:    {label:'값 반환',          bg:'#E8F5D0',tc:'#27500A'},
  done:      {label:'완료',            bg:'#E8F5D0',tc:'#27500A'},
};

const steps=[];
let arr=[...initArr];
const callStack=[];

function snap(phase,exp,lo,hi,hl,groups,lines,vars){
  steps.push({
    arr:[...arr],phase,exp,lo,hi,
    hl:Object.assign({},hl),
    groups:groups?groups.map(g=>({idxs:[...g.idxs],sorted:g.sorted})):null,
    stack:callStack.map(f=>Object.assign({},f)),
    lines:lines||[],
    vars:Object.assign({},vars)
  });
}

function makeHL(lo,hi,extra){
  const h={};
  for(let i=0;i<N;i++) h[i]=(i>=lo&&i<=hi)?'def':'inactive';
  if(extra) Object.assign(h,extra);
  return h;
}
function ssp(lo,hi,stride){
  stride=stride||1;
  let m=lo;
  for(let j=lo+stride;j<=hi;j+=stride) if(arr[j]<arr[m]) m=j;
  let t=arr[lo];arr[lo]=arr[m];arr[m]=t;
}
function partition(lo,hi){
  const x=arr[hi]; let i=lo-1;
  for(let j=lo;j<hi;j++) if(arr[j]<=x){i++;let t=arr[i];arr[i]=arr[j];arr[j]=t;}
  let t=arr[i+1];arr[i+1]=arr[hi];arr[hi]=t;
  return i+1;
}
function buildGroups(lo,g){
  const res=[];
  for(let j=lo;j<lo+g;j++){
    const idxs=[];
    for(let l=0;l<5;l++) idxs.push(j+l*g);
    res.push({idxs,sorted:false});
  }
  return res;
}

function select(lo,hi,k){
  const depth=callStack.length;
  callStack.push({lo,hi,k});

  // C++: cout << "n = " << hi-lo+1 << ", lo = " << lo << ...
  snap('call',
    `Select(lo=${lo}, hi=${hi}, k=${k})  n=${hi-lo+1}\n탐색 범위 [${lo}..${hi}]에서 ${k}번째 작은 값을 찾습니다.`,
    lo,hi,makeHL(lo,hi),null,[0,1],
    {depth,lo,hi,k});

  // C++: while ((hi - lo + 1) % 5 != 0)
  while((hi-lo+1)%5!==0){
    snap('trim',
      `(hi-lo+1)=${hi-lo+1}  5의 배수가 아님\nSelectionSortPass(arr, ${lo}, ${hi})  -> 최솟값을 arr[${lo}]으로`,
      lo,hi,makeHL(lo,hi,{[lo]:'hi'}),null,[3,5],
      {depth,lo,hi,k});
    ssp(lo,hi);  // SelectionSortPass(arr, lo, hi)  stride=1
    if(k===1){
      snap('return',
        `k=1  ->  arr[${lo}] = ${arr[lo]}  최솟값  ->  return { lo, arr[lo] }`,
        lo,hi,makeHL(lo,hi,{[lo]:'ok'}),null,[6],
        {depth,lo,hi,k,result:arr[lo]});
      callStack.pop();
      return {index:lo,value:arr[lo]};
    }
    snap('trim',
      `arr[${lo}]=${arr[lo]} 확정  lo += 1 -> ${lo+1}  k -= 1 -> ${k-1}`,
      lo,hi,makeHL(lo,hi,{[lo]:'min'}),null,[7],
      {depth,lo,hi,k});
    lo++;k--;
  }

  // C++: int g = (hi - lo + 1) / 5;
  const g=(hi-lo+1)/5;
  const gd=buildGroups(lo,g);
  snap('groups',
    `(hi-lo+1)=${hi-lo+1}  -> g = ${g}  (${g}개 그룹, stride=${g})\nPrintGroups 정렬 전:`,
    lo,hi,makeHL(lo,hi),gd,[10],
    {depth,lo,hi,k,g});

  // C++: for (int j = lo; j < hi; j++) SelectionSortPass(arr, j, hi, g);
  for(let j=lo; j<hi; j++) ssp(j,hi,g);

  const medLo=lo+2*g, medHi=lo+3*g-1;
  const bsHL=makeHL(lo,hi);
  for(let i=medLo;i<=medHi;i++) bsHL[i]='med';
  snap('bsort',
    `for (j=lo; j<hi; j++) SelectionSortPass(arr, j, hi, g=${g})  완료\n보라색 = 각 그룹 중간값 (idx ${medLo}~${medHi})`,
    lo,hi,bsHL,gd.map(g2=>({idxs:[...g2.idxs],sorted:true})),[13,14],
    {depth,lo,hi,k,g});

  // C++: Pair x = Select(arr, lo+2*g, lo+3*g-1, ceil(g/2.0));
  const medK=Math.ceil(g/2);
  snap('recurse',
    `Pair x = Select(arr, ${medLo}, ${medHi}, ${medK})\n${g}개 중간값 중 ${medK}번째  =  중간값들의 중간값`,
    medLo,medHi,makeHL(medLo,medHi),null,[17,18],
    {depth,lo,hi,k,g});

  const x=select(medLo,medHi,medK);

  // C++: swap(arr[x.index], arr[hi]);
  snap('pivot',
    `x = { index:${x.index}, value:${x.value} }\nswap(arr[${x.index}], arr[${hi}])  ->  피벗을 hi 위치로`,
    lo,hi,makeHL(lo,hi,{[x.index]:'pivot',[hi]:'hi'}),null,[21],
    {depth,lo,hi,k,g,x_val:x.value,x_idx:x.index});

  let t=arr[x.index];arr[x.index]=arr[hi];arr[hi]=t;

  // C++: int index = Partition(arr, lo, hi);
  snap('pivot',
    `swap 완료: arr[${hi}]=${arr[hi]}  (피벗)\nint index = Partition(arr, ${lo}, ${hi})`,
    lo,hi,makeHL(lo,hi,{[hi]:'pivot'}),null,[21,22],
    {depth,lo,hi,k,g,x_val:arr[hi],x_idx:x.index});

  const index=partition(lo,hi);
  const r=index-lo;
  const partHL={};
  for(let i=0;i<N;i++){
    if(i<lo||i>hi){partHL[i]='inactive';continue;}
    if(i<index) partHL[i]='less';
    else if(i===index) partHL[i]='pivot';
    else partHL[i]='more';
  }
  snap('partition',
    `Partition 완료  index=${index}  피벗=${arr[index]}\n[${lo}..${index-1}] <= 피벗  |  pivot  |  [${index+1}..${hi}] > 피벗\nindex-lo=${r}  k-1=${k-1}`,
    lo,hi,partHL,null,[22,25],
    {depth,lo,hi,k,g,x_val:arr[index],x_idx:x.index,index,r});

  let result;
  // C++: if (index - lo == k - 1) return Pair{ index, arr[index] };
  if(index-lo===k-1){
    snap('return',
      `index-lo == k-1 == ${k-1}\nreturn Pair{ ${index}, arr[${index}]=${arr[index]} }`,
      lo,hi,makeHL(lo,hi,{[index]:'ok'}),null,[25,26],
      {depth,lo,hi,k,g,x_val:arr[index],x_idx:x.index,index,r,result:arr[index]});
    result={index,value:arr[index]};
  // C++: else if (k - 1 < index - lo) return Select(arr, lo, index-1, k);
  } else if(k-1<index-lo){
    snap('recurse',
      `k-1=${k-1} < index-lo=${r}  ->  피벗 왼쪽\nreturn Select(arr, ${lo}, ${index-1}, ${k})`,
      lo,index-1,makeHL(lo,index-1),null,[27,28],
      {depth,lo,hi,k,g,x_val:arr[index],x_idx:x.index,index,r});
    result=select(lo,index-1,k);
  // C++: else return Select(arr, index+1, hi, k - index + lo - 1);
  } else {
    const nk=k-index+lo-1;
    snap('recurse',
      `k-1=${k-1} > index-lo=${r}  ->  피벗 오른쪽\nreturn Select(arr, ${index+1}, ${hi}, ${nk})`,
      index+1,hi,makeHL(index+1,hi),null,[29,30,31],
      {depth,lo,hi,k,g,x_val:arr[index],x_idx:x.index,index,r});
    result=select(index+1,hi,nk);
  }

  callStack.pop();
  return result;
}

  `초기 상태: arr = [24, 23, ..., 0] (역순)\nSelect(arr, 0, 24, 13): 25개 원소 중 13번째 작은 값 탐색 시작`,

// ── 렌더 ───────────────────────────────────────────────────────────────────────
let cur=0,timer=null;

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function syntaxHL(s){
  return esc(s)
    .replace(/\b(int|void|return|if|else|while|for|struct|auto|const|swap|ceil)\b/g,'<span class="kw">$1</span>')
    .replace(/\b(Select|Partition|SelectionSortPass|buildGroups|Print|PrintGroups)\b/g,'<span class="fn">$1</span>')
    .replace(/\b(\d+(\.\d+)?)\b/g,'<span class="num">$1</span>')
    .replace(/\/\/.*/g, m=>`<span class="cm">${m}</span>`);
}

function renderCode_defLine(t){
  // C++ 함수 서명 하이라이트
  return esc(t)
    .replace(/\bPair\b/g,'<span class="kw">Pair</span>')
    .replace(/\bSelect\b/g,'<span class="fn">Select</span>')
    .replace(/\bvector&lt;int&gt;&amp;\b/g,'<span class="kw">vector&lt;int&gt;&amp;</span>')
    .replace(/\bint\b/g,'<span class="kw">int</span>');
}

function renderCode(activeLines){
  const activeSet=new Set(activeLines);
  document.getElementById('code-el').innerHTML=CODE_LINES.map((line,idx)=>{
    const isActive=activeSet.has(idx);
    const displayNum=line.type==='blank'?'':String(idx+1);
    let txt;
    if(line.type==='comment')   txt=`<span class="cm">${esc(line.t)}</span>`;
    else if(line.type==='def')  txt=renderCode_defLine(line.t);
    else if(line.type==='code') txt=syntaxHL(line.t);
    else                        txt=esc(line.t);
    return `<div class="${isActive?'code-row active':'code-row'}">` +
      `<div class="code-lnum">${displayNum}</div>` +
      `<div class="code-arrow">&#9658;</div>` +
      `<div class="code-text">${txt}</div></div>`;
  }).join('');
  const first=document.querySelector('#code-el .code-row.active');
  if(first) first.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function renderWatch(vars, prevVars){
  prevVars=prevVars||{};
  let html='<div class="watch-header">변수 &middot; 값</div>';
  let lastGroup=null;
  VAR_DEFS.forEach(def=>{
    if(def.group!==lastGroup){
      if(lastGroup!==null) html+=`<div style="height:1px;"></div>`;
      html+=`<div class="watch-sep">${def.group}</div>`;
      lastGroup=def.group;
    }
    const val=vars[def.key];
    const prev=prevVars[def.key];
    const isNull=(val===undefined||val===null);
    const changed=!isNull&&prev!==undefined&&prev!==null&&(prev!==val);
    const valStr=isNull?'&mdash;':String(val);
    let rowCls='watch-row';
    if(isNull) rowCls+=' null-val';
    else if(changed) rowCls+=' changed';
    html+=`<div class="${rowCls}">` +
      `<div class="wname-wrap"><div class="wdot"></div><div class="wname">${def.label}</div></div>` +
      `<div class="wval">${valStr}</div></div>`;
  });
  document.getElementById('watch-el').innerHTML=html;
}

function render(){
  cur=Math.max(0,Math.min(cur,steps.length-1));
  const s=steps[cur];
  const prev=cur>0?steps[cur-1]:null;
  const ph=PHASES[s.phase]||PHASES.init;

  document.getElementById('pf').style.width=((cur/(steps.length-1))*100)+'%';
  document.getElementById('sc').textContent=`${cur+1} / ${steps.length}`;
  document.getElementById('phase-el').innerHTML=
    `<span class="phase" style="background:${ph.bg};color:${ph.tc};">${ph.label}</span>`;
  document.getElementById('exp').textContent=s.exp;
  document.getElementById('range-el').innerHTML=
    `<span class="range-tag">lo = ${s.lo}</span>`+
    `<span class="range-tag">hi = ${s.hi}</span>`+
    `<span class="range-tag">n = ${s.hi-s.lo+1}</span>`;
  document.getElementById('arr-el').innerHTML=s.arr.map((v,i)=>{
    const cls=s.hl[i]||'def';
    return `<div class="acell"><div class="abox ${cls}">${v}</div><div class="aidx">[${i}]</div></div>`;
  }).join('');

  const gsec=document.getElementById('groups-section');
  if(s.groups){
    gsec.style.display='';
    document.getElementById('groups-label').textContent=
      s.phase==='bsort'?'groups (정렬 후) - 보라색 = 그룹 중간값':'groups (정렬 전)';
    const hdr=`<div class="group-row"><div class="glabel" style="font-size:9px;">stride-></div>${
      [0,1,2,3,4].map(l=>`<div class="gitem" style="font-size:9px;background:none;border:none;color:var(--color-text-tertiary);">[${l}]</div>`).join('')
    }</div>`;
    const rows=s.groups.map((gd2,gi)=>{
      const items=gd2.idxs.map((idx2,pos)=>{
        const isMed=gd2.sorted&&pos===2;
        return `<div class="gitem ${isMed?'med':(gd2.sorted?'ok':'def')}">${s.arr[idx2]}</div>`;
      }).join('');
      return `<div class="group-row"><div class="glabel">G${gi+1}(j=${gd2.idxs[0]})</div>${items}</div>`;
    }).join('');
    document.getElementById('groups-el').innerHTML=hdr+rows;
  } else {
    gsec.style.display='none';
  }

  const se=document.getElementById('stack-el');
  if(!s.stack.length){
    se.innerHTML=`<div class="sframe" style="opacity:.4;">- empty -</div>`;
  } else {
    se.innerHTML=s.stack.map((f,i)=>{
      const isTop=i===s.stack.length-1;
      return `<div class="sframe ${isTop?'top':''}">
        <span class="sdepth">${i}</span>
        <span style="color:var(--color-text-tertiary);">-></span>
        <span>Select(lo=<b>${f.lo}</b>, hi=<b>${f.hi}</b>, k=<b>${f.k}</b>)
          <span style="font-size:10px;color:var(--color-text-tertiary);"> n=${f.hi-f.lo+1}</span>
          ${isTop?'<span style="color:#3A9A60;"> <- 현재</span>':''}
        </span>
      </div>`;
    }).join('');
  }

  renderCode(s.lines);
  renderWatch(s.vars, prev?prev.vars:{});
}

function next(){cur++;render();}
function prev(){cur--;render();}
function reset(){stopA();cur=0;render();}
function autoPlay(){
  if(timer){stopA();return;}
  document.getElementById('abtn').textContent='일시정지';
  timer=setInterval(()=>{if(cur>=steps.length-1){stopA();return;}cur++;render();},850);
}
function stopA(){
  clearInterval(timer);timer=null;
  document.getElementById('abtn').textContent='자동재생';
}
render();
</script>
