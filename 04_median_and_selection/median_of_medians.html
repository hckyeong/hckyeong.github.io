<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Median of Medians 단계별 실행</title>
  <style>
    :root {
      --bg: #f3f2ee;
      --panel: #ebe9e1;
      --border: #c8c5bb;
      --text: #121212;
      --muted: #8a887f;
      --badge-bg: #ece3ff;
      --badge-text: #6c3ab8;
      --btn-bg: #cfe4fb;
      --btn-text: #0f4f8d;
      --active: #ffd37f;
      --moving: #f2cade;
      --median: #ddb8f7;
      --pivot: #a8e6de;
      --less: #b5d4f4;
      --more: #f4c0d1;
      --ok: #bddc8f;
      --code-active: #fdf3e0;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Apple SD Gothic Neo", "Segoe UI", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body { min-height: 100vh; }

    .page {
      max-width: 920px;
      margin: 0 auto;
      padding: 12px 10px 28px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.45;
      color: #333;
    }

    .badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      font-weight: 700;
    }

    .panel { margin-bottom: 14px; }

    .title {
      margin: 0 0 7px;
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .progress {
      height: 4px;
      background: #ddd9cf;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .fill {
      height: 100%;
      background: #378add;
      transition: width 0.25s ease;
    }

    .phase-chip {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .meta,
    .vars {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 7px;
    }

    .chip {
      display: inline-block;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 11px;
      font-family: Consolas, monospace;
      color: #4e4c46;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .desc {
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      min-height: 52px;
    }

    .arr-grid {
      display: grid;
      grid-template-columns: repeat(13, minmax(0, 1fr));
      gap: 4px;
    }

    .arr-cell {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .box {
      width: 100%;
      min-width: 0;
      height: 34px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Consolas, monospace;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
    }

    .default { background: var(--panel); }
    .inactive { color: var(--muted); }
    .active { background: var(--active); border-color: #ba7517; color: #633806; }
    .moving { background: var(--moving); border-color: #d4537e; color: #72243e; }
    .median { background: var(--median); border-color: #9b59d0; color: #4a1580; }
    .pivot { background: var(--pivot); border-color: #3aada0; color: #0c4a40; }
    .less { background: var(--less); border-color: #378add; color: #0c447c; }
    .more { background: var(--more); border-color: #d4537e; color: #72243e; }
    .ok { background: var(--ok); border-color: #639922; color: #27500a; }

    .idx {
      margin-top: 3px;
      font-size: 9px;
      color: var(--muted);
      font-family: Consolas, monospace;
    }

    .marks {
      margin-top: 2px;
      min-height: 18px;
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      justify-content: center;
      align-items: flex-start;
    }

    .mark {
      padding: 1px 4px;
      border-radius: 999px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,0,0,0.08);
      font-size: 8px;
      line-height: 1.2;
      font-family: Consolas, monospace;
      color: #4f4f4f;
      white-space: nowrap;
    }

    .groups-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .groups { display: grid; gap: 4px; min-width: max-content; }
    .grow { display: flex; align-items: center; gap: 4px; }
    .glabel { width: 72px; font-family: Consolas, monospace; font-size: 10px; color: var(--muted); }
    .gitem { width: 38px; height: 24px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: Consolas, monospace; font-size: 11px; font-weight: 700; border: 1px solid var(--border); background: var(--panel); }
    .gitem.median { background: var(--median); border-color: #9b59d0; color: #4a1580; }
    .gitem.ok { background: var(--ok); border-color: #639922; color: #27500a; }

    .stack { max-height: 110px; overflow-y: auto; font-family: Consolas, monospace; font-size: 11px; display: grid; gap: 2px; }
    .sline { display: flex; gap: 6px; color: var(--muted); }
    .sline.top { color: var(--text); font-weight: 700; }

    .code-wrap { background: #1e1e1e; border: 1px solid #2f2f2f; border-radius: 12px; overflow: hidden; }
    .code-inner { max-height: 280px; overflow-y: auto; font-family: "Cascadia Code", Consolas, monospace; font-size: 11px; line-height: 1.65; padding: 6px 0; }
    .code-row { display: grid; grid-template-columns: 34px 14px 1fr; align-items: stretch; }
    .code-row.active { background: rgba(255,255,255,0.06); border-left: 3px solid #ffcc66; }
    .ln { text-align: right; padding: 0 6px 0 3px; color: #858585; border-right: 1px solid #2f2f2f; user-select: none; }
    .arrow { display: flex; align-items: center; justify-content: center; color: #ffcc66; opacity: 0; }
    .code-row.active .arrow { opacity: 1; }
    .ct { padding: 0 10px 0 4px; white-space: pre; color: #d4d4d4; }
    .code-row.active .ct { color: #ffffff; font-weight: 700; }
    .kw { color: #569cd6; }
    .fn { color: #dcdcaa; }
    .num { color: #b5cea8; }
    .op { color: #d4d4d4; }
    .cm { color: #6a9955; }

    .legend { display: flex; flex-wrap: wrap; gap: 8px 12px; margin-top: 10px; font-size: 10px; color: #444; }
    .ld { width: 10px; height: 10px; border-radius: 3px; display: inline-block; border: 1px solid rgba(0,0,0,0.1); }

    .controls { margin-bottom: 12px; }
    .dockin { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)) auto; gap: 6px; align-items: center; }

    button { border: none; border-radius: 10px; min-height: 32px; background: var(--btn-bg); color: var(--btn-text); font-size: 12px; font-weight: 700; cursor: pointer; padding: 0 7px; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    .count { text-align: right; white-space: nowrap; font-family: Consolas, monospace; font-size: 13px; }

    @media (max-width: 480px) {
      .dockin { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .count { grid-column: 1 / -1; text-align: center; }
    }

    @media (min-width: 760px) {
      .page { padding: 20px 18px 40px; }
      h1 { font-size: 34px; }
      .sub { font-size: 17px; margin-bottom: 14px; }
      .badge { font-size: 22px; padding: 8px 18px; margin-bottom: 14px; }
      .title { font-size: 22px; margin-bottom: 10px; }
      .chip { font-size: 16px; padding: 6px 12px; }
      .box { height: 48px; font-size: 18px; border-radius: 12px; }
      .idx { font-size: 14px; }
      .mark { font-size: 11px; }
      .desc { font-size: 21px; line-height: 1.6; min-height: 90px; }
      .glabel { width: 95px; font-size: 16px; }
      .gitem { width: 52px; height: 32px; font-size: 16px; }
      .stack { font-size: 16px; max-height: 160px; }
      .code-inner { max-height: 360px; font-size: 14px; }
      .legend { font-size: 16px; gap: 12px 18px; }
      .ld { width: 18px; height: 18px; border-radius: 5px; }
      button { min-height: 42px; font-size: 18px; border-radius: 12px; }
      .count { font-size: 20px; }
    }
  </style>
<link rel="stylesheet" href="../shared/topological-baseline.css">
</head>
<body>
  <main class="page">
    <h1>Median of Medians 단계별 실행</h1>
    <p class="sub">arr = [24, 23, 22, ..., 0] / n = 25 / k = 13번째 작은 값 선택</p>
    <div class="badge">선택 알고리즘</div>

    <section class="panel">
      <div class="progress"><div class="fill" id="fill"></div></div>
      <div id="phase"></div>
    </section>

    <section class="panel controls">
      <div class="dockin">
        <button id="prev">◀ 이전</button>
        <button id="next">다음 ▶</button>
        <button id="play">▶ 자동재생</button>
        <button id="reset">↻ 초기화</button>
        <div class="count" id="count">1 / 1</div>
      </div>
    </section>

    <section class="panel">
      <h2 class="title">ARR</h2>
      <div class="meta" id="meta"></div>
      <div class="vars" id="vars"></div>
      <div class="arr-grid" id="arr"></div>
      <div class="card"><div class="desc" id="desc"></div></div>
    </section>

    <section class="panel" id="groupsSec" style="display:none;">
      <h2 class="title" id="groupsTtl">GROUPS</h2>
      <div class="card groups-wrap"><div class="groups" id="groups"></div></div>
    </section>

    <section class="panel">
      <h2 class="title">CALL STACK</h2>
      <div class="card"><div class="stack" id="stack"></div></div>
    </section>

    <section class="panel">
      <h2 class="title">CURRENT CODE</h2>
      <div class="code-wrap"><div class="code-inner" id="code"></div></div>
    </section>

    <div class="legend">
      <span><span class="ld" style="background:var(--active)"></span>현재 처리</span>
      <span><span class="ld" style="background:var(--moving)"></span>선택 정렬 이동</span>
      <span><span class="ld" style="background:var(--median)"></span>그룹 중앙값</span>
      <span><span class="ld" style="background:var(--pivot)"></span>피벗</span>
      <span><span class="ld" style="background:var(--less)"></span>피벗 이하</span>
      <span><span class="ld" style="background:var(--more)"></span>피벗 초과</span>
      <span><span class="ld" style="background:var(--ok)"></span>확정 / 반환</span>
    </div>
  </main>

  <script>
    const init = Array.from({ length: 25 }, (_, i) => 24 - i);
    const codeLines = [
      'Pair Select(vector<int>& arr, int lo, int hi, int k)',
      '{',
      '    while ((hi - lo + 1) % 5 != 0)',
      '    {',
      '        SelectionSortPass(arr, lo, hi);',
      '        if (k == 1) return { lo, arr[lo] };',
      '        lo += 1;',
      '        k -= 1;',
      '    }',
      '',
      '    int g = (hi - lo + 1) / 5;',
      '    PrintGroups(arr, lo, g);',
      '    for (int j = lo; j < hi; j++)',
      '        SelectionSortPass(arr, j, hi, g);',
      '',
      '    Pair x = Select(arr, lo + 2 * g, lo + 3 * g - 1, ceil(g / 2.0));',
      '    swap(arr[x.index], arr[hi]);',
      '    int index = Partition(arr, lo, hi);',
      '',
      '    if (index - lo == k - 1) return Pair{ index, arr[index] };',
      '    else if (k - 1 < index - lo) return Select(arr, lo, index - 1, k);',
      '    else return Select(arr, index + 1, hi, k - index + lo - 1);',
      '}',
      '',
      'int Partition(vector<int>& arr, int lo, int hi)',
      '{',
      '    int x = arr[hi];',
      '    int i = lo - 1;',
      '    for (int j = lo; j < hi; j++)',
      '        if (arr[j] <= x) { i += 1; swap(arr[i], arr[j]); }',
      '    swap(arr[i + 1], arr[hi]);',
      '}'
    ];
    const phaseMap = {
      start: ['초기화', '#ece3ff', '#6c3ab8'],
      call: ['Select 호출', '#ece3ff', '#6c3ab8'],
      trim: ['5개 정렬 보정', '#fff7de', '#854f0b'],
      groups: ['그룹 구성', '#f2ebff', '#6c3ab8'],
      groupSort: ['그룹 정렬', '#fde9f1', '#8c3157'],
      recurseMedian: ['중앙값 재귀', '#f2ebff', '#6c3ab8'],
      pivot: ['피벗 선택', '#dff7f3', '#0c4a40'],
      partition: ['Partition', '#dff7f3', '#0c4a40'],
      recurseLeft: ['왼쪽 재귀', '#e6f2ff', '#0c447c'],
      recurseRight: ['오른쪽 재귀', '#fde6ee', '#72243e'],
      done: ['완료', '#e6f3d5', '#27500a']
    };
    const steps = [];
    const callStack = [];

    function clone(a) { return a.slice(); }
    function cloneStack() { return callStack.map((v) => ({ ...v })); }
    function cloneGroups(gs) { return gs ? gs.map((g) => ({ ...g, indices: g.indices.slice(), values: g.values.slice() })) : null; }
    function makeClasses(n, lo, hi, extra = {}) {
      const arr = Array.from({ length: n }, (_, i) => i < lo || i > hi ? 'inactive' : 'default');
      Object.entries(extra).forEach(([k, v]) => { arr[Number(k)] = v; });
      return arr;
    }
    function addMark(map, index, label) {
      if (index == null || index < 0 || index >= init.length) return;
      if (!map[index]) map[index] = [];
      if (!map[index].includes(label)) map[index].push(label);
    }
    function makeMarks(lo, hi, extra = {}) {
      const map = {};
      addMark(map, lo, 'lo');
      addMark(map, hi, 'hi');
      Object.entries(extra).forEach(([label, idx]) => addMark(map, idx, label));
      return map;
    }
    function makeGroups(arr, lo, g, sorted = false) {
      if (!g || g <= 0) return null;
      const out = [];
      for (let j = lo; j <= lo + g - 1; j++) {
        const indices = [], values = [];
        for (let l = 0; l < 5; l++) {
          const idx = j + l * g;
          indices.push(idx);
          values.push(arr[idx]);
        }
        out.push({ label: `G${j - lo + 1}`, indices, values, sorted });
      }
      return out;
    }
    function formatMeta(s) {
      const items = [`lo=${s.lo}`, `hi=${s.hi}`, `n=${s.hi - s.lo + 1}`, `k=${s.k}`];
      if (s.g != null) items.push(`g=${s.g}`);
      if (s.pivotValue != null) items.push(`pivot=${s.pivotValue}`);
      if (s.resultValue != null) items.push(`result=${s.resultValue}`);
      return items;
    }
    function formatVars(s) {
      return Object.entries(s.vars || {}).filter(([, v]) => v != null).map(([k, v]) => `${k}=${v}`);
    }
    function push(snapshot) {
      steps.push({
        phase: 'start',
        array: clone(init),
        lo: 0,
        hi: init.length - 1,
        k: Math.ceil(init.length / 2),
        g: null,
        pivotValue: null,
        resultValue: null,
        desc: '',
        vars: {},
        classes: makeClasses(init.length, 0, init.length - 1),
        marks: makeMarks(0, init.length - 1),
        groups: null,
        stack: cloneStack(),
        activeLines: [],
        ...snapshot
      });
    }
    function selectionSortPass(arr, start, hi, stride, ctx) {
      let minIndex = start;
      const touched = [];
      for (let j = start; j <= hi; j += stride) touched.push(j);
      for (let j = start + stride; j <= hi; j += stride) if (arr[j] < arr[minIndex]) minIndex = j;
      const o1 = {};
      touched.forEach((i) => { o1[i] = 'moving'; });
      o1[start] = 'active';
      o1[minIndex] = 'active';
      push({
        phase: ctx.phase,
        array: clone(arr), lo: ctx.lo, hi: ctx.hi, k: ctx.k, g: ctx.g ?? null,
        desc: ctx.before(minIndex), vars: ctx.vars(minIndex), classes: makeClasses(arr.length, ctx.lo, ctx.hi, o1),
        marks: makeMarks(ctx.lo, ctx.hi, ctx.marks(minIndex)), groups: cloneGroups(ctx.groups ? ctx.groups() : null), stack: cloneStack(), activeLines: ctx.activeLines
      });
      [arr[start], arr[minIndex]] = [arr[minIndex], arr[start]];
      const o2 = {};
      touched.forEach((i) => { o2[i] = 'moving'; });
      o2[start] = 'ok';
      if (minIndex !== start) o2[minIndex] = 'moving';
      push({
        phase: ctx.phase,
        array: clone(arr), lo: ctx.lo, hi: ctx.hi, k: ctx.k, g: ctx.g ?? null,
        desc: ctx.after(minIndex), vars: ctx.vars(minIndex), classes: makeClasses(arr.length, ctx.lo, ctx.hi, o2),
        marks: makeMarks(ctx.lo, ctx.hi, ctx.marks(minIndex)), groups: cloneGroups(ctx.groups ? ctx.groups() : null), stack: cloneStack(), activeLines: ctx.activeLines
      });
    }
    function partition(arr, lo, hi, k, g) {
      const x = arr[hi];
      let i = lo - 1;
      push({ phase: 'partition', array: clone(arr), lo, hi, k, g, pivotValue: x, desc: `Partition 시작: x = arr[${hi}] = ${x}`,
        vars: { i, x }, classes: makeClasses(arr.length, lo, hi, { [hi]: 'pivot' }), marks: makeMarks(lo, hi, { pivot: hi }), stack: cloneStack(), activeLines: [24, 25, 26, 27] });
      for (let j = lo; j < hi; j++) {
        const probeClass = arr[j] <= x ? 'less' : 'more';
        push({ phase: 'partition', array: clone(arr), lo, hi, k, g, pivotValue: x,
          desc: `j = ${j} 검사: arr[${j}] = ${arr[j]} ${arr[j] <= x ? '<=' : '>'} pivot ${x}`,
          vars: { i, j, x }, classes: makeClasses(arr.length, lo, hi, { [hi]: 'pivot', [j]: probeClass }), marks: makeMarks(lo, hi, { i, j, pivot: hi }), stack: cloneStack(), activeLines: [28, 29] });
        if (arr[j] <= x) {
          i += 1;
          [arr[i], arr[j]] = [arr[j], arr[i]];
          push({ phase: 'partition', array: clone(arr), lo, hi, k, g, pivotValue: x,
            desc: `arr[${j}] <= pivot 이므로 i = ${i} 로 증가시키고 arr[${i}] 와 arr[${j}] 를 교환합니다.`,
            vars: { i, j, x }, classes: makeClasses(arr.length, lo, hi, { [hi]: 'pivot', [i]: 'less', [j]: 'less' }), marks: makeMarks(lo, hi, { i, j, pivot: hi }), stack: cloneStack(), activeLines: [29] });
        }
      }
      [arr[i + 1], arr[hi]] = [arr[hi], arr[i + 1]];
      const index = i + 1;
      const finalClasses = {};
      for (let p = lo; p < index; p++) finalClasses[p] = 'less';
      finalClasses[index] = 'pivot';
      for (let p = index + 1; p <= hi; p++) finalClasses[p] = 'more';
      push({ phase: 'partition', array: clone(arr), lo, hi, k, g, pivotValue: x,
        desc: `마지막으로 arr[${index}] 와 pivot 을 교환합니다. pivot index = ${index}`,
        vars: { i, index, x }, classes: makeClasses(arr.length, lo, hi, finalClasses), marks: makeMarks(lo, hi, { i, index, pivot: index }), stack: cloneStack(), activeLines: [30] });
      return index;
    }
    function select(arr, lo, hi, k) {
      callStack.push({ lo, hi, k });
      push({ phase: 'call', array: clone(arr), lo, hi, k, desc: `Select(arr, ${lo}, ${hi}, ${k}) 호출\nn = ${hi - lo + 1}, lo = ${lo}, hi = ${hi}, k = ${k}`,
        vars: {}, classes: makeClasses(arr.length, lo, hi), marks: makeMarks(lo, hi), stack: cloneStack(), activeLines: [0, 1] });
      while ((hi - lo + 1) % 5 !== 0) {
        selectionSortPass(arr, lo, hi, 1, {
          phase: 'trim', lo, hi, k, activeLines: [2, 4],
          before: (minIndex) => `범위 길이가 5의 배수가 아니므로 SelectionSortPass(arr, ${lo}, ${hi})를 수행합니다.\n현재 최소 후보는 arr[${minIndex}] = ${arr[minIndex]}`,
          after: () => `가장 작은 값이 arr[${lo}] 로 이동했습니다. 이제 이 값을 범위에서 제거할지 확인합니다.`,
          vars: (minIndex) => ({ min: minIndex }), marks: (minIndex) => ({ min: minIndex })
        });
        if (k === 1) {
          push({ phase: 'done', array: clone(arr), lo, hi, k, resultValue: arr[lo], desc: `k == 1 이므로 arr[${lo}] = ${arr[lo]} 를 바로 반환합니다.`,
            vars: {}, classes: makeClasses(arr.length, lo, hi, { [lo]: 'ok' }), marks: makeMarks(lo, hi, { result: lo }), stack: cloneStack(), activeLines: [5] });
          const r = { index: lo, value: arr[lo] };
          callStack.pop();
          return r;
        }
        lo += 1;
        k -= 1;
        callStack[callStack.length - 1] = { lo, hi, k };
        push({ phase: 'trim', array: clone(arr), lo, hi, k, desc: `가장 작은 값 1개를 버렸으므로 lo = ${lo}, k = ${k} 로 줄입니다.`,
          vars: {}, classes: makeClasses(arr.length, lo, hi), marks: makeMarks(lo, hi), stack: cloneStack(), activeLines: [6, 7] });
      }
      const g = (hi - lo + 1) / 5;
      push({ phase: 'groups', array: clone(arr), lo, hi, k, g, desc: `이제 범위 길이는 5의 배수입니다. 그룹 개수 g = ${g}\n각 그룹은 stride = ${g} 간격으로 구성됩니다.`,
        vars: { g }, classes: makeClasses(arr.length, lo, hi), marks: makeMarks(lo, hi), groups: makeGroups(arr, lo, g, false), stack: cloneStack(), activeLines: [10, 11] });
      for (let j = lo; j < hi; j++) {
        selectionSortPass(arr, j, hi, g, {
          phase: 'groupSort', lo, hi, k, g, activeLines: [12, 13], groups: () => makeGroups(arr, lo, g, false),
          before: (minIndex) => `그룹 정렬: j = ${j}, stride = ${g}\nSelectionSortPass(arr, ${j}, ${hi}, ${g}) 를 수행합니다.\n선택된 최소 후보는 arr[${minIndex}] = ${arr[minIndex]}`,
          after: () => `stride ${g} 기준으로 위치 ${j} 에 가장 작은 값이 배치되었습니다.`,
          vars: (minIndex) => ({ j, min: minIndex, g }), marks: (minIndex) => ({ j, min: minIndex })
        });
      }
      const sortedGroups = makeGroups(arr, lo, g, true);
      const midLo = lo + 2 * g;
      const midHi = lo + 3 * g - 1;
      const medClasses = {};
      for (let i = midLo; i <= midHi; i++) medClasses[i] = 'median';
      push({ phase: 'groups', array: clone(arr), lo, hi, k, g, desc: `그룹 정렬 완료. 가운데 줄의 값들이 각 그룹의 중앙값입니다.\n이제 [${midLo} .. ${midHi}] 범위에서 다시 Select를 호출합니다.`,
        vars: { g }, classes: makeClasses(arr.length, lo, hi, medClasses), marks: makeMarks(lo, hi), groups: sortedGroups, stack: cloneStack(), activeLines: [13, 15] });
      const medK = Math.ceil(g / 2.0);
      push({ phase: 'recurseMedian', array: clone(arr), lo, hi, k, g, desc: `중앙값들의 중앙값을 구하기 위해 Select(arr, ${midLo}, ${midHi}, ${medK}) 를 호출합니다.`,
        vars: { g }, classes: makeClasses(arr.length, lo, hi, medClasses), marks: makeMarks(lo, hi), groups: sortedGroups, stack: cloneStack(), activeLines: [15] });
      const x = select(arr, midLo, midHi, medK);
      push({ phase: 'pivot', array: clone(arr), lo, hi, k, g, pivotValue: x.value, desc: `중앙값들의 중앙값 = ${x.value}, index = ${x.index}\n이 값을 현재 범위의 피벗으로 사용합니다.`,
        vars: { g, x: x.index }, classes: makeClasses(arr.length, lo, hi, { [x.index]: 'pivot' }), marks: makeMarks(lo, hi, { x: x.index }), stack: cloneStack(), activeLines: [15, 16] });
      [arr[x.index], arr[hi]] = [arr[hi], arr[x.index]];
      push({ phase: 'pivot', array: clone(arr), lo, hi, k, g, pivotValue: x.value, desc: `pivot ${x.value} 를 arr[${hi}] 로 보낸 뒤 Partition(arr, ${lo}, ${hi}) 를 수행합니다.`,
        vars: { g, x: hi }, classes: makeClasses(arr.length, lo, hi, { [hi]: 'pivot' }), marks: makeMarks(lo, hi, { pivot: hi }), stack: cloneStack(), activeLines: [16, 17] });
      const index = partition(arr, lo, hi, k, g);
      if (index - lo === k - 1) {
        push({ phase: 'done', array: clone(arr), lo, hi, k, g, resultValue: arr[index], desc: `index - lo = ${index - lo}, k - 1 = ${k - 1}\n두 값이 같으므로 arr[${index}] = ${arr[index]} 를 반환합니다.`,
          vars: { index }, classes: makeClasses(arr.length, lo, hi, { [index]: 'ok' }), marks: makeMarks(lo, hi, { index }), stack: cloneStack(), activeLines: [19] });
        const r = { index, value: arr[index] };
        callStack.pop();
        return r;
      }
      if (k - 1 < index - lo) {
        push({ phase: 'recurseLeft', array: clone(arr), lo, hi, k, g, pivotValue: arr[index], desc: `k - 1 < index - lo 이므로 왼쪽 구간 Select(arr, ${lo}, ${index - 1}, ${k}) 로 재귀합니다.`,
          vars: { index }, classes: makeClasses(arr.length, lo, hi, { [index]: 'pivot' }), marks: makeMarks(lo, hi, { index }), stack: cloneStack(), activeLines: [20] });
        const r = select(arr, lo, index - 1, k);
        callStack.pop();
        return r;
      }
      const nextK = k - index + lo - 1;
      push({ phase: 'recurseRight', array: clone(arr), lo, hi, k, g, pivotValue: arr[index], desc: `k - 1 > index - lo 이므로 오른쪽 구간 Select(arr, ${index + 1}, ${hi}, ${nextK}) 로 재귀합니다.`,
        vars: { index }, classes: makeClasses(arr.length, lo, hi, { [index]: 'pivot' }), marks: makeMarks(lo, hi, { index }), stack: cloneStack(), activeLines: [21] });
      const r = select(arr, index + 1, hi, nextK);
      callStack.pop();
      return r;
    }
    push({ phase: 'start', array: clone(init), lo: 0, hi: init.length - 1, k: Math.ceil(init.length / 2), desc: '초기 상태: arr = [24, 23, ..., 0] 역순 배열에서 13번째 작은 값을 찾습니다.', vars: {}, classes: makeClasses(init.length, 0, init.length - 1), marks: makeMarks(0, init.length - 1), stack: [], activeLines: [0, 1] });
    const work = clone(init);
    const result = select(work, 0, work.length - 1, Math.ceil(work.length / 2));
    push({ phase: 'done', array: clone(work), lo: 0, hi: work.length - 1, k: Math.ceil(work.length / 2), resultValue: result.value, desc: `최종 결과: 13번째 작은 값(중앙값)은 ${result.value} 입니다.`, vars: { result: result.index }, classes: makeClasses(work.length, 0, work.length - 1, { [result.index]: 'ok' }), marks: makeMarks(0, work.length - 1, { result: result.index }), stack: [], activeLines: [19] });
    const dom = { fill: document.getElementById('fill'), phase: document.getElementById('phase'), meta: document.getElementById('meta'), vars: document.getElementById('vars'), arr: document.getElementById('arr'), desc: document.getElementById('desc'), groupsSec: document.getElementById('groupsSec'), groupsTtl: document.getElementById('groupsTtl'), groups: document.getElementById('groups'), stack: document.getElementById('stack'), code: document.getElementById('code'), count: document.getElementById('count'), prev: document.getElementById('prev'), next: document.getElementById('next'), play: document.getElementById('play'), reset: document.getElementById('reset') };
    let cur = 0, timer = null;
    function escapeHtml(text) {
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function colorizeCode(line) {
      return escapeHtml(line)
        .replace(/(\/\/.*)$/g, '<span class="cm">$1</span>')
        .replace(/\b(Pair|int|return|else if|else|if|while|for)\b/g, '<span class="kw">$1</span>')
        .replace(/\b(Select|SelectionSortPass|Partition|PrintGroups|swap|ceil)\b/g, '<span class="fn">$1</span>')
        .replace(/\b(\d+)\b/g, '<span class="num">$1</span>');
    }
    function renderCode(activeLines) {
      const active = new Set(activeLines || []);
      dom.code.innerHTML = codeLines.map((line, idx) => {
        const html = colorizeCode(line);
        return `<div class="code-row ${active.has(idx) ? 'active' : ''}"><div class="ln">${String(idx + 1).padStart(2, '0')}</div><div class="arrow">▶</div><div class="ct">${html}</div></div>`;
      }).join('');
    }
    function render(step) {
      cur = Math.max(0, Math.min(step, steps.length - 1));
      const s = steps[cur];
      const ph = phaseMap[s.phase] || phaseMap.start;
      dom.fill.style.width = `${(cur / (steps.length - 1)) * 100}%`;
      dom.phase.innerHTML = `<span class="phase-chip" style="background:${ph[1]};color:${ph[2]};">${ph[0]}</span>`;
      dom.meta.innerHTML = formatMeta(s).map((v) => `<span class="chip">${v}</span>`).join('');
      dom.vars.innerHTML = formatVars(s).map((v) => `<span class="chip">${v}</span>`).join('');
      dom.arr.innerHTML = s.array.map((v, i) => {
        const marks = (s.marks && s.marks[i]) ? s.marks[i].map((m) => `<span class="mark">${m}</span>`).join('') : '';
        return `<div class="arr-cell"><div class="box ${s.classes[i] || ''}">${v}</div><div class="idx">[${i}]</div><div class="marks">${marks}</div></div>`;
      }).join('');
      dom.desc.textContent = s.desc;
      if (!s.groups || !s.groups.length) {
        dom.groupsSec.style.display = 'none';
      } else {
        dom.groupsSec.style.display = '';
        dom.groupsTtl.textContent = s.g != null ? `GROUPS (g = ${s.g})` : 'GROUPS';
        dom.groups.innerHTML = s.groups.map((g) => `<div class="grow"><div class="glabel">${g.label}</div>${g.values.map((v, idx) => `<div class="gitem ${(g.sorted && idx === 2) ? 'median' : (g.sorted ? 'ok' : '')}">${v}</div>`).join('')}</div>`).join('');
      }
      dom.stack.innerHTML = s.stack && s.stack.length ? s.stack.map((f, i) => `<div class="sline ${i === s.stack.length - 1 ? 'top' : ''}"><span>${i}</span><span>Select(lo=${f.lo}, hi=${f.hi}, k=${f.k})</span></div>`).join('') : '<div class="sline">- empty -</div>';
      renderCode(s.activeLines);
      dom.count.textContent = `${cur + 1} / ${steps.length}`;
      dom.prev.disabled = cur === 0;
      dom.next.disabled = cur === steps.length - 1;
    }
    function stop() { if (!timer) return; clearInterval(timer); timer = null; dom.play.textContent = '▶ 자동재생'; }
    function start() { if (timer) return; dom.play.textContent = '⏸ 일시정지'; timer = setInterval(() => { if (cur >= steps.length - 1) { stop(); return; } render(cur + 1); }, 950); }
    dom.prev.addEventListener('click', () => { stop(); render(cur - 1); });
    dom.next.addEventListener('click', () => { stop(); render(cur + 1); });
    dom.play.addEventListener('click', () => { if (timer) stop(); else start(); });
    dom.reset.addEventListener('click', () => { stop(); render(0); });
    render(0);
  </script>
<script src="../shared/viewer-controls.js"></script>
</body>
