<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Bucket Sort 단계별 실행</title>
  <style>
    :root {
      --bg: #f3f2ee;
      --panel: #ebe9e1;
      --border: #c8c5bb;
      --text: #121212;
      --muted: #8a887f;
      --badge-bg: #ece3ff;
      --badge-text: #6c3ab8;
      --button-bg: #cfe4fb;
      --button-text: #0f4f8d;
      --active: #ffd37f;
      --moving: #f2cade;
      --sorted: #bddc8f;
      --merged: #bad8f6;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Apple SD Gothic Neo", "Segoe UI", sans-serif;
      -webkit-text-size-adjust: 100%;
    }

    body { min-height: 100vh; }

    .page {
      max-width: 880px;
      margin: 0 auto;
      padding: 12px 10px calc(98px + env(safe-area-inset-bottom));
    }

    h1 {
      margin: 0 0 6px;
      font-size: 19px;
      line-height: 1.2;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 0 0 10px;
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      margin-bottom: 10px;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--badge-bg);
      color: var(--badge-text);
      font-size: 12px;
      font-weight: 700;
    }

    .section { margin-bottom: 16px; }

    .section-title {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .arr-scroll {
      overflow-x: auto;
      padding-bottom: 3px;
      -webkit-overflow-scrolling: touch;
    }

    .arr-grid,
    .idx-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 64px;
      gap: 5px;
    }

    .idx-grid {
      margin-top: 4px;
      text-align: center;
      color: #353535;
      font-family: Consolas, monospace;
      font-size: 11px;
    }

    .cell {
      padding: 10px 4px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      text-align: center;
      font-family: Consolas, monospace;
      font-size: 13px;
      line-height: 1;
    }

    .cell.active { background: var(--active); }
    .cell.merged { background: var(--merged); }
    .cell.empty { color: #a4a29a; }

    .desc {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.55;
      word-break: keep-all;
    }

    .bucket-list {
      display: grid;
      gap: 4px;
    }

    .bucket-row {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 8px;
      align-items: start;
      padding: 2px 0;
      border-radius: 7px;
    }

    .bucket-row.active { background: rgba(0, 0, 0, 0.03); }

    .bucket-meta {
      padding-top: 4px;
      font-family: Consolas, monospace;
      font-size: 11px;
      white-space: nowrap;
    }

    .bucket-values {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      min-height: 26px;
      align-items: center;
    }

    .pill {
      padding: 4px 7px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--panel);
      font-family: Consolas, monospace;
      font-size: 11px;
      line-height: 1;
    }

    .pill.moving { background: var(--moving); }
    .pill.sorted { background: var(--sorted); }
    .pill.merged { background: var(--merged); }
    .pill.empty {
      border: none;
      background: transparent;
      color: var(--muted);
      padding-left: 0;
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
      margin-top: 8px;
      font-size: 10px;
      color: #222;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
      flex: 0 0 auto;
    }

    .dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 50;
      border-top: 1px solid #d3d1c8;
      background: rgba(243, 242, 238, 0.98);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
    }

    .dock-inner {
      max-width: 880px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)) auto;
      gap: 6px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 11px;
      min-height: 38px;
      background: var(--button-bg);
      color: var(--button-text);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 0 8px;
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .count {
      text-align: right;
      white-space: nowrap;
      font-family: Consolas, monospace;
      font-size: 14px;
      padding-right: 2px;
    }

    @media (max-width: 480px) {
      .dock-inner {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .count {
        grid-column: 1 / -1;
        text-align: center;
        padding-top: 1px;
      }
    }

    @media (min-width: 760px) {
      .page {
        padding: 20px 18px calc(124px + env(safe-area-inset-bottom));
      }

      h1 { font-size: 34px; }
      .sub { font-size: 17px; margin-bottom: 16px; }
      .badge { font-size: 22px; padding: 8px 18px; margin-bottom: 14px; }
      .section { margin-bottom: 24px; }
      .section-title { font-size: 28px; margin-bottom: 10px; }
      .arr-grid, .idx-grid { grid-auto-columns: 92px; gap: 8px; }
      .idx-grid { font-size: 22px; margin-top: 6px; }
      .cell { font-size: 30px; padding: 15px 6px; border-radius: 12px; }
      .desc { font-size: 21px; line-height: 1.6; margin-top: 16px; }
      .bucket-row { grid-template-columns: 155px 1fr; gap: 12px; padding: 3px 0; }
      .bucket-meta { font-size: 22px; padding-top: 5px; }
      .bucket-values { gap: 7px; min-height: 34px; }
      .pill { font-size: 20px; padding: 6px 10px; }
      .legend { font-size: 17px; gap: 10px 16px; margin-top: 12px; }
      .dot { width: 18px; height: 18px; border-radius: 5px; }
      .dock { padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); }
      button { min-height: 54px; font-size: 26px; border-radius: 14px; }
      .count { font-size: 30px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>Bucket Sort 단계별 실행</h1>
    <p class="sub">arr = {0.78, 0.17, 0.39, 0.26, 0.72, 0.94, 0.21, 0.12, 0.23, 0.67} / num_buckets = 10</p>
    <div class="badge" id="phaseBadge">초기화</div>

    <section class="section">
      <h2 class="section-title">ARR</h2>
      <div class="arr-scroll">
        <div class="arr-grid" id="inputValues"></div>
        <div class="idx-grid" id="inputIndices"></div>
      </div>
      <p class="desc" id="description"></p>
    </section>

    <section class="section">
      <h2 class="section-title">BUCKETS[0..9]</h2>
      <div class="bucket-list" id="bucketList"></div>
      <div class="legend">
        <span class="legend-item"><span class="dot" style="background: var(--active);"></span>현재 처리 중</span>
        <span class="legend-item"><span class="dot" style="background: var(--moving);"></span>이동 중</span>
        <span class="legend-item"><span class="dot" style="background: var(--sorted);"></span>정렬 완료</span>
        <span class="legend-item"><span class="dot" style="background: var(--merged);"></span>arr로 수집 중</span>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">RESULT ARR</h2>
      <div class="arr-scroll">
        <div class="arr-grid" id="outputValues"></div>
        <div class="idx-grid" id="outputIndices"></div>
      </div>
    </section>
  </main>

  <div class="dock">
    <div class="dock-inner">
      <button id="prevBtn">◀ 이전</button>
      <button id="nextBtn">다음 ▶</button>
      <button id="playBtn">▶ 자동재생</button>
      <button id="resetBtn">↻ 초기화</button>
      <div class="count" id="stepCount">1 / 1</div>
    </div>
  </div>

  <script>
    const arr = [0.78, 0.17, 0.39, 0.26, 0.72, 0.94, 0.21, 0.12, 0.23, 0.67];
    const numBuckets = 10;

    const inputValuesEl = document.getElementById("inputValues");
    const inputIndicesEl = document.getElementById("inputIndices");
    const outputValuesEl = document.getElementById("outputValues");
    const outputIndicesEl = document.getElementById("outputIndices");
    const bucketListEl = document.getElementById("bucketList");
    const descriptionEl = document.getElementById("description");
    const phaseBadgeEl = document.getElementById("phaseBadge");
    const stepCountEl = document.getElementById("stepCount");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const playBtn = document.getElementById("playBtn");
    const resetBtn = document.getElementById("resetBtn");

    let currentStep = 0;
    let timer = null;

    function format(value) {
      return value == null ? "..." : value.toFixed(2);
    }

    function bucketRange(index) {
      return `${(index / numBuckets).toFixed(1)}~${((index + 1) / numBuckets).toFixed(1)}`;
    }

    function cloneBuckets(buckets) {
      return buckets.map((bucket) => bucket.slice());
    }

    function buildSnapshots() {
      const snapshots = [];
      const buckets = Array.from({ length: numBuckets }, () => []);
      const output = Array(arr.length).fill(null);

      function push(snapshot) {
        snapshots.push({
          phase: "초기화",
          description: "",
          activeInput: -1,
          activeBucket: -1,
          activeValue: null,
          mergedCount: output.filter((v) => v != null).length,
          sortedBucket: Array(numBuckets).fill(false),
          input: arr.slice(),
          output: output.slice(),
          buckets: cloneBuckets(buckets),
          ...snapshot
        });
      }

      push({
        phase: "초기화",
        description: "초기 상태: arr에 10개의 float 값, buckets는 10개의 빈 vector<float>로 초기화됩니다."
      });

      arr.forEach((value, index) => {
        const bucketIndex = Math.min(numBuckets - 1, Math.floor(value * numBuckets));
        buckets[bucketIndex].push(value);
        push({
          phase: "분배",
          activeInput: index,
          activeBucket: bucketIndex,
          activeValue: value,
          description: `${format(value)} 는 bucket_index = floor(${format(value)} * ${numBuckets}) = ${bucketIndex} 이므로 bucket[${bucketIndex}]에 들어갑니다.`
        });
      });

      push({
        phase: "분배 완료",
        description: "모든 값을 버킷에 넣었습니다. 이제 각 버킷 내부를 Insertion Sort로 정렬합니다."
      });

      const sortedState = Array(numBuckets).fill(false);

      for (let bucketIndex = 0; bucketIndex < numBuckets; bucketIndex++) {
        if (buckets[bucketIndex].length <= 1) {
          sortedState[bucketIndex] = true;
          push({
            phase: "버킷 정렬",
            activeBucket: bucketIndex,
            sortedBucket: sortedState.slice(),
            description:
              buckets[bucketIndex].length === 0
                ? `bucket[${bucketIndex}]는 비어 있어서 건너뜁니다.`
                : `bucket[${bucketIndex}]는 원소가 하나라 이미 정렬된 상태입니다.`
          });
          continue;
        }

        for (let i = 1; i < buckets[bucketIndex].length; i++) {
          const key = buckets[bucketIndex][i];
          let j = i - 1;

          push({
            phase: "버킷 정렬",
            activeBucket: bucketIndex,
            activeValue: key,
            sortedBucket: sortedState.slice(),
            description: `bucket[${bucketIndex}]에서 key = ${format(key)} 의 위치를 찾습니다.`
          });

          while (j >= 0 && buckets[bucketIndex][j] > key) {
            buckets[bucketIndex][j + 1] = buckets[bucketIndex][j];
            push({
              phase: "버킷 정렬",
              activeBucket: bucketIndex,
              activeValue: key,
              sortedBucket: sortedState.slice(),
              description: `${format(key)} 보다 큰 값을 오른쪽으로 이동합니다.`
            });
            j--;
          }

          buckets[bucketIndex][j + 1] = key;
          push({
            phase: "버킷 정렬",
            activeBucket: bucketIndex,
            activeValue: key,
            sortedBucket: sortedState.slice(),
            description: `${format(key)} 를 올바른 위치에 삽입했습니다.`
          });
        }

        sortedState[bucketIndex] = true;
        push({
          phase: "버킷 정렬",
          activeBucket: bucketIndex,
          sortedBucket: sortedState.slice(),
          description: `bucket[${bucketIndex}] 정렬 완료`
        });
      }

      push({
        phase: "병합 시작",
        sortedBucket: sortedState.slice(),
        description: "정렬된 버킷을 bucket[0]부터 차례대로 결과 배열에 복사합니다."
      });

      let outIndex = 0;
      for (let bucketIndex = 0; bucketIndex < numBuckets; bucketIndex++) {
        for (let j = 0; j < buckets[bucketIndex].length; j++) {
          output[outIndex] = buckets[bucketIndex][j];
          push({
            phase: "병합",
            activeBucket: bucketIndex,
            activeValue: buckets[bucketIndex][j],
            mergedCount: outIndex + 1,
            sortedBucket: sortedState.slice(),
            description: `${format(buckets[bucketIndex][j])} 를 결과 arr[${outIndex}] 로 복사합니다.`
          });
          outIndex++;
        }
      }

      push({
        phase: "완료",
        mergedCount: output.length,
        sortedBucket: sortedState.slice(),
        description: `정렬 완료: ${output.map((value) => format(value)).join(", ")}`
      });

      return snapshots;
    }

    const snapshots = buildSnapshots();

    function renderArray(valuesEl, indicesEl, values, activeIndex, mergedCount, outputMode) {
      valuesEl.innerHTML = "";
      indicesEl.innerHTML = "";

      values.forEach((value, index) => {
        const cell = document.createElement("div");
        cell.className = "cell";
        if (!outputMode && index === activeIndex) cell.classList.add("active");
        if (outputMode && value != null && index < mergedCount) cell.classList.add("merged");
        if (value == null) cell.classList.add("empty");
        cell.textContent = format(value);
        valuesEl.appendChild(cell);

        const idx = document.createElement("div");
        idx.textContent = `[${index}]`;
        indicesEl.appendChild(idx);
      });
    }

    function renderBuckets(snapshot) {
      bucketListEl.innerHTML = "";

      for (let i = 0; i < numBuckets; i++) {
        const row = document.createElement("div");
        row.className = "bucket-row";
        if (snapshot.activeBucket === i) row.classList.add("active");

        const meta = document.createElement("div");
        meta.className = "bucket-meta";
        meta.textContent = `[${i}] ${bucketRange(i)}`;

        const values = document.createElement("div");
        values.className = "bucket-values";

        if (snapshot.buckets[i].length === 0) {
          const empty = document.createElement("span");
          empty.className = "pill empty";
          empty.textContent = "empty";
          values.appendChild(empty);
        } else {
          const hotIndex = snapshot.activeBucket === i ? snapshot.buckets[i].lastIndexOf(snapshot.activeValue) : -1;
          snapshot.buckets[i].forEach((value, index) => {
            const pill = document.createElement("span");
            pill.className = "pill";
            if (snapshot.phase.indexOf("정렬") !== -1 && index === hotIndex) pill.classList.add("moving");
            if (snapshot.phase.indexOf("병합") !== -1 && index === hotIndex) pill.classList.add("merged");
            if (snapshot.sortedBucket && snapshot.sortedBucket[i]) pill.classList.add("sorted");
            pill.textContent = format(value);
            values.appendChild(pill);
          });
        }

        row.append(meta, values);
        bucketListEl.appendChild(row);
      }
    }

    function render(step) {
      currentStep = Math.max(0, Math.min(step, snapshots.length - 1));
      const snapshot = snapshots[currentStep];

      phaseBadgeEl.textContent = snapshot.phase;
      descriptionEl.textContent = snapshot.description;
      stepCountEl.textContent = `${currentStep + 1} / ${snapshots.length}`;

      renderArray(inputValuesEl, inputIndicesEl, snapshot.input, snapshot.activeInput, snapshot.mergedCount, false);
      renderArray(outputValuesEl, outputIndicesEl, snapshot.output, -1, snapshot.mergedCount, true);
      renderBuckets(snapshot);

      prevBtn.disabled = currentStep === 0;
      nextBtn.disabled = currentStep === snapshots.length - 1;
    }

    function stopAutoplay() {
      if (!timer) return;
      clearInterval(timer);
      timer = null;
      playBtn.textContent = "▶ 자동재생";
    }

    function startAutoplay() {
      if (timer) return;
      playBtn.textContent = "⏸ 일시정지";
      timer = setInterval(() => {
        if (currentStep >= snapshots.length - 1) {
          stopAutoplay();
          return;
        }
        render(currentStep + 1);
      }, 1100);
    }

    prevBtn.addEventListener("click", () => {
      stopAutoplay();
      render(currentStep - 1);
    });

    nextBtn.addEventListener("click", () => {
      stopAutoplay();
      render(currentStep + 1);
    });

    playBtn.addEventListener("click", () => {
      if (timer) stopAutoplay();
      else startAutoplay();
    });

    resetBtn.addEventListener("click", () => {
      stopAutoplay();
      render(0);
    });

    render(0);
  </script>
</body>
</html>
