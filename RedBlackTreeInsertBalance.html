
<style>
*{box-sizing:border-box;}
.nbtn{border:0.5px solid var(--color-border-secondary);background:transparent;padding:7px 20px;border-radius:var(--border-radius-md);cursor:pointer;color:var(--color-text-primary);font-size:13px;transition:background .15s;}
.nbtn:hover:not([disabled]){background:var(--color-background-secondary);}
.nbtn[disabled]{opacity:.35;cursor:default;}
.badge{display:inline-flex;align-items:center;padding:4px 14px;border-radius:6px;font-size:12px;font-weight:500;}
.cline{display:flex;align-items:center;gap:8px;padding:5px 10px;border-radius:6px;font-size:12px;font-family:var(--font-mono);color:var(--color-text-secondary);transition:background .2s;white-space:nowrap;}
.cline.active{background:var(--color-background-secondary);color:var(--color-text-primary);}
.dot{width:7px;height:7px;border-radius:50%;background:var(--color-border-secondary);flex-shrink:0;transition:background .2s;}
.dot.on{background:var(--color-text-primary);}
.info-box{background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:8px 14px;margin:8px auto;max-width:560px;font-size:12px;font-family:var(--font-mono);color:var(--color-text-secondary);line-height:1.7;}
</style>

<div style="padding:0.75rem 0;">
<svg id="tsv" width="100%" viewBox="0 0 680 320" style="display:block;"></svg>

<div style="background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:6px 10px;margin:8px auto;max-width:560px;">
  <div class="cline" id="cl1"><span style="color:#185FA5;font-weight:500;">if</span>&nbsp;<span>(isRed(h.right) &amp;&amp; !isRed(h.left))</span>&nbsp;<span style="opacity:.5">→</span>&nbsp;<span style="color:#185FA5;font-weight:500;">RotateLeft</span></div>
  <div class="cline" id="cl2"><span style="color:#0F6E56;font-weight:500;">if</span>&nbsp;<span>(isRed(h.left) &amp;&amp; isRed(h.left?.left))</span>&nbsp;<span style="opacity:.5">→</span>&nbsp;<span style="color:#0F6E56;font-weight:500;">RotateRight</span></div>
  <div class="cline" id="cl3"><span style="color:#854F0B;font-weight:500;">if</span>&nbsp;<span>(isRed(h.left) &amp;&amp; isRed(h.right))</span>&nbsp;<span style="opacity:.5">→</span>&nbsp;<span style="color:#854F0B;font-weight:500;">FlipColors</span></div>
</div>

<div class="info-box" id="callstack"></div>

<div style="text-align:center;margin:6px 0 2px;"><span id="badge" class="badge"></span></div>
<div style="text-align:center;margin:2px 0;"><strong id="stitle" style="font-size:15px;"></strong></div>
<div style="text-align:center;margin:0 0 8px;"><span id="sdesc" style="font-size:13px;color:var(--color-text-secondary);"></span></div>

<div style="display:flex;gap:5px;justify-content:center;margin:6px 0;" id="ddots"></div>
<div style="display:flex;align-items:center;justify-content:center;gap:12px;margin:6px 0;">
  <button class="nbtn" id="pbtn" onclick="nav(-1)">← 이전</button>
  <span id="slbl" style="font-size:12px;color:var(--color-text-secondary);min-width:44px;text-align:center;"></span>
  <button class="nbtn" id="nbtn2" onclick="nav(1)">다음 →</button>
</div>

<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:14px;margin-top:8px;">
  <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#E24B4A"/></svg>RED</span>
  <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#2C2C2A" stroke="#888780" stroke-width="1"/></svg>BLACK</span>
  <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);"><svg width="24" height="14"><line x1="0" y1="7" x2="24" y2="7" stroke="#E24B4A" stroke-width="3" stroke-linecap="round"/></svg>RED 링크</span>
  <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="none" stroke="#EF9F27" stroke-width="2"/></svg>처리 노드</span>
  <span style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-secondary);"><svg width="14" height="14"><circle cx="7" cy="7" r="6" fill="#97C459"/></svg>신규 삽입</span>
</div>
</div>

<script>
// Tree state per step: array of {k, c, l, r} + metadata
// Initial tree after inserting 2,4,6,8 into LLRB:
//       4(B)
//      /    \
//    2(B)   6(B)
//              \
//              8(R)
// Now inserting 5:

const STEPS = [
  {
    title:"초기 상태 — 5 삽입 전",
    desc:"2,4,6,8이 삽입된 LLRB 트리. Insert(root, 5) 호출 시작.",
    cond:0,
    stack:"Insert(4, 5)  ← 호출 시작\n  5 > 4 → 오른쪽으로: Insert(6, 5)",
    hi:[], newNode:null,
    tree:{k:4,c:'B',
      l:{k:2,c:'B',l:null,r:null},
      r:{k:6,c:'B',l:null,r:{k:8,c:'R',l:null,r:null}}
    }
  },
  {
    title:"5 삽입 — node 6의 왼쪽 자식으로",
    desc:"5 < 6 → 왼쪽. null 도달 → new Node(5, RED) 반환.",
    cond:0,
    stack:"Insert(4, 5)\n  └─ Insert(6, 5)\n       └─ Insert(null, 5) → new Node(5, RED) ✓",
    hi:[5], newNode:5,
    tree:{k:4,c:'B',
      l:{k:2,c:'B',l:null,r:null},
      r:{k:6,c:'B',l:{k:5,c:'R',l:null,r:null},r:{k:8,c:'R',l:null,r:null}}
    }
  },
  {
    title:"Balance @ node 6 — 조건 체크",
    desc:"left(5)=RED, right(8)=RED → Cond1 해당 없음, Cond2 해당 없음, Cond3 발동!",
    cond:3,
    stack:"Insert(4, 5)\n  └─ Insert(6, 5) ← 지금 여기서 Balance(6) 실행\n       Balance → FlipColors(6) 발동",
    hi:[6,5,8],
    tree:{k:4,c:'B',
      l:{k:2,c:'B',l:null,r:null},
      r:{k:6,c:'B',l:{k:5,c:'R',l:null,r:null},r:{k:8,c:'R',l:null,r:null}}
    }
  },
  {
    title:"FlipColors(6) 완료",
    desc:"6: BLACK→RED, 5: RED→BLACK, 8: RED→BLACK. node 6을 반환.",
    cond:3,
    stack:"Insert(4, 5)\n  └─ Insert(6, 5) → FlipColors 완료, node 6(RED) 반환\n       6이 RED가 됐으므로 부모(4)에서 추가 체크 필요",
    hi:[6,5,8],
    tree:{k:4,c:'B',
      l:{k:2,c:'B',l:null,r:null},
      r:{k:6,c:'R',l:{k:5,c:'B',l:null,r:null},r:{k:8,c:'B',l:null,r:null}}
    }
  },
  {
    title:"Balance @ node 4 — 조건 체크",
    desc:"right(6)=RED && left(2)=BLACK → Condition 1 발동! RotateLeft(4).",
    cond:1,
    stack:"Insert(4, 5) ← 지금 여기서 Balance(4) 실행\n  └─ Insert(6, 5) 완료\n       Balance → right RED, left BLACK → RotateLeft(4) 발동",
    hi:[4,6],
    tree:{k:4,c:'B',
      l:{k:2,c:'B',l:null,r:null},
      r:{k:6,c:'R',l:{k:5,c:'B',l:null,r:null},r:{k:8,c:'B',l:null,r:null}}
    }
  },
  {
    title:"RotateLeft(4) 완료",
    desc:"6이 새 서브루트. 4는 6의 왼쪽 자식. 4는 RED, 6은 4의 색(BLACK)을 가짐.",
    cond:1,
    stack:"Insert(4, 5) → RotateLeft 완료\n  node 6(B)이 새 서브루트, node 4(R)이 왼쪽 자식\n  Balance 계속: Cond2 체크",
    hi:[6,4],
    tree:{k:6,c:'B',
      l:{k:4,c:'R',l:{k:2,c:'B',l:null,r:null},r:{k:5,c:'B',l:null,r:null}},
      r:{k:8,c:'B',l:null,r:null}
    }
  },
  {
    title:"Cond2 체크 @ node 6 — 해당 없음",
    desc:"left(4)=RED지만 left.left(2)=BLACK → Cond2 미발동. Cond3 체크.",
    cond:0,
    stack:"Balance(6) 계속\n  Cond2: left=RED, left.left=BLACK → 미발동\n  Cond3: left=RED, right=BLACK → 미발동\n  → 완료, node 6 반환",
    hi:[6,4,2],
    tree:{k:6,c:'B',
      l:{k:4,c:'R',l:{k:2,c:'B',l:null,r:null},r:{k:5,c:'B',l:null,r:null}},
      r:{k:8,c:'B',l:null,r:null}
    }
  },
  {
    title:"삽입 완료 ✓",
    desc:"root.color = BLACK 강제 설정. LLRB 불변 조건 모두 유지.",
    cond:0,
    stack:"Insert 완료\n  root(6).color = BLACK 강제 설정\n  FlipColors(6@step3) + RotateLeft(4@step5) 총 2회 발동",
    hi:[],
    tree:{k:6,c:'B',
      l:{k:4,c:'R',l:{k:2,c:'B',l:null,r:null},r:{k:5,c:'B',l:null,r:null}},
      r:{k:8,c:'B',l:null,r:null}
    }
  }
];

const COND=[
  {label:'Balance 조건 없음',bg:'var(--color-background-secondary)',color:'var(--color-text-secondary)'},
  {label:'Condition 1: RotateLeft',bg:'#E6F1FB',color:'#185FA5'},
  {label:'Condition 2: RotateRight',bg:'#E1F5EE',color:'#0F6E56'},
  {label:'Condition 3: FlipColors',bg:'#FAEEDA',color:'#854F0B'}
];

let cur=0;

function layoutTree(node,x,y,dx){
  if(!node)return{};
  const m={};m[node.k]={x,y};
  if(node.l)Object.assign(m,layoutTree(node.l,x-dx,y+82,dx*0.55));
  if(node.r)Object.assign(m,layoutTree(node.r,x+dx,y+82,dx*0.55));
  return m;
}

function renderTree(tree,hi,newNode){
  const pos=layoutTree(tree,340,56,155);
  let s='';
  function edges(n){
    if(!n)return;
    ['l','r'].forEach(side=>{
      if(!n[side])return;
      const p=pos[n.k],c=pos[n[side].k];
      const isR=n[side].c==='R';
      s+=`<line x1="${p.x}" y1="${p.y+24}" x2="${c.x}" y2="${c.y-24}" stroke="${isR?'#E24B4A':'#888780'}" stroke-width="${isR?3:1.5}" stroke-linecap="round"/>`;
      edges(n[side]);
    });
  }
  function nodes(n){
    if(!n)return;
    const{x,y}=pos[n.k];
    const isHi=hi&&hi.includes(n.k);
    const isNew=n.k===newNode;
    const fill=isNew?'#639922':(n.c==='R'?'#E24B4A':'#2C2C2A');
    if(isHi)s+=`<circle cx="${x}" cy="${y}" r="30" fill="none" stroke="#EF9F27" stroke-width="1.8" opacity="0.7"/>`;
    s+=`<circle cx="${x}" cy="${y}" r="23" fill="${fill}" stroke="${n.c==='B'?'#888780':'none'}" stroke-width="1"/>`;
    s+=`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="central" fill="white" font-size="14" font-weight="500" font-family="sans-serif">${n.k}</text>`;
    ['l','r'].forEach(side=>nodes(n[side]));
  }
  edges(tree);nodes(tree);
  document.getElementById('tsv').innerHTML=s;
}

function updateUI(){
  const step=STEPS[cur];
  renderTree(step.tree,step.hi,step.newNode);
  const c=COND[step.cond];
  const b=document.getElementById('badge');
  b.textContent=c.label;b.style.background=c.bg;b.style.color=c.color;
  document.getElementById('stitle').textContent=step.title;
  document.getElementById('sdesc').textContent=step.desc;
  document.getElementById('slbl').textContent=`${cur+1} / ${STEPS.length}`;
  document.getElementById('pbtn').disabled=cur===0;
  document.getElementById('nbtn2').disabled=cur===STEPS.length-1;
  document.getElementById('callstack').innerHTML=
    '<span style="color:var(--color-text-secondary);font-size:11px;">📞 콜 스택 / 실행 흐름</span><br>'+
    step.stack.split('\n').map(l=>`<span>${l}</span>`).join('<br>');
  [1,2,3].forEach(i=>{
    document.getElementById(`cl${i}`).classList.toggle('active',step.cond===i);
  });
  document.getElementById('ddots').innerHTML=STEPS.map((_,i)=>
    `<div class="dot ${i===cur?'on':''}"></div>`).join('');
}

function nav(d){cur=Math.max(0,Math.min(STEPS.length-1,cur+d));updateUI();}
updateUI();
</script>
